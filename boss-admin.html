<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Master Control | Saddam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#020617] text-white p-6 font-sans">
    
    <div id="login-form" class="max-w-md mx-auto mt-20 p-12 bg-[#0d1425] rounded-[50px] border border-white/5 text-center shadow-2xl">
        <h1 class="text-2xl font-black text-blue-500 mb-8 italic uppercase tracking-widest">Boss Access</h1>
        <input id="pass" type="password" placeholder="PASSWORD" class="w-full bg-black p-5 rounded-3xl text-center font-black tracking-widest outline-none border border-gray-800 mb-6">
        <button onclick="login()" class="w-full bg-blue-600 py-5 rounded-3xl font-black uppercase text-xs tracking-[0.3em]">Access Dashboard</button>
    </div>

    <div id="dashboard" class="hidden max-w-4xl mx-auto space-y-8">
        <div class="flex justify-between items-center bg-[#0d1425] p-8 rounded-[40px] border border-white/5">
            <h2 class="text-xl font-black text-blue-500 uppercase italic">Control Station V4</h2>
            <button onclick="save()" class="bg-blue-600 px-10 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl shadow-blue-500/20 active:scale-95 transition-all">Save Changes</button>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-[#0d1425] p-8 rounded-[40px] border border-white/5 space-y-6">
                <h3 class="text-xs font-black uppercase text-gray-500 tracking-widest">Design & Branding</h3>
                <input id="site-name" type="text" placeholder="Site Name" class="w-full bg-black p-4 rounded-2xl border border-gray-800 text-xs">
                <input id="live-text" type="text" placeholder="Live Status Text" class="w-full bg-black p-4 rounded-2xl border border-gray-800 text-xs text-blue-400">
                <input id="theme-color" type="color" class="w-full h-14 bg-black p-2 rounded-2xl border border-gray-800">
                <textarea id="notice" placeholder="Announcement (Scrolling Text)" class="w-full bg-black p-4 rounded-2xl border border-gray-800 text-xs h-24"></textarea>
            </div>

            <div class="bg-[#0d1425] p-8 rounded-[40px] border border-white/5 space-y-6">
                <h3 class="text-xs font-black uppercase text-gray-500 tracking-widest">Ad Engine</h3>
                <input id="ad-link" type="text" placeholder="Adsterra Direct Link" class="w-full bg-black p-4 rounded-2xl border border-gray-800 text-xs text-green-400">
                <div class="grid grid-cols-2 gap-4">
                    <select id="ad-status" class="bg-black p-4 rounded-2xl border border-gray-800 text-xs font-bold">
                        <option value="on">AD ON</option>
                        <option value="off">AD OFF</option>
                    </select>
                    <input id="skip-timer" type="number" placeholder="Skip Timer (Sec)" class="bg-black p-4 rounded-2xl border border-gray-800 text-xs text-center font-bold">
                </div>
                <input id="entry-delay" type="number" placeholder="Entry Ad Delay (Sec)" class="w-full bg-black p-4 rounded-2xl border border-gray-800 text-xs text-center font-bold">
            </div>

            <div class="bg-[#0d1425] p-8 rounded-[40px] border border-white/5 space-y-6 col-span-full">
                <h3 class="text-xs font-black uppercase text-gray-500 tracking-widest">Content & Media</h3>
                <div class="grid md:grid-cols-2 gap-6">
                    <input id="channel-id" type="text" placeholder="YouTube Channel Link" class="w-full bg-black p-4 rounded-2xl border border-gray-800 text-xs text-red-400">
                    <input id="banners" type="text" placeholder="Banner URLs (Comma separated)" class="w-full bg-black p-4 rounded-2xl border border-gray-800 text-xs">
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyB7w62sre73EzNY7TsvHfg88sjVrzPTcSM", 
            databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com",
            projectId: "saddam-premium-hub" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            if(document.getElementById('pass').value === 'saddam786') {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            } else { alert('Access Denied!'); }
        }

        function loadData() {
            db.ref('settings').once('value', s => {
                const d = s.val();
                if(d) {
                    document.getElementById('site-name').value = d.siteName || "";
                    document.getElementById('live-text').value = d.liveText || "";
                    document.getElementById('theme-color').value = d.themeColor || "#3b82f6";
                    document.getElementById('notice').value = d.notice || "";
                    document.getElementById('ad-link').value = d.adLink || "";
                    document.getElementById('ad-status').value = d.adStatus || "on";
                    document.getElementById('skip-timer').value = d.skipTimer || 10;
                    document.getElementById('entry-delay').value = d.entryDelay || 3;
                    document.getElementById('channel-id').value = d.channelId || "";
                    document.getElementById('banners').value = d.banners || "";
                }
            });
        }

        function save() {
            const data = {
                siteName: document.getElementById('site-name').value,
                liveText: document.getElementById('live-text').value,
                themeColor: document.getElementById('theme-color').value,
                notice: document.getElementById('notice').value,
                adLink: document.getElementById('ad-link').value,
                adStatus: document.getElementById('ad-status').value,
                skipTimer: parseInt(document.getElementById('skip-timer').value),
                entryDelay: parseInt(document.getElementById('entry-delay').value),
                channelId: document.getElementById('channel-id').value,
                banners: document.getElementById('banners').value
            };
            db.ref('settings').set(data).then(() => alert("সাফল্যের সাথে ওয়েবসাইট আপডেট করা হয়েছে!"));
        }
    </script>
</body>
      </html>
