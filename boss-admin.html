<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Master Admin | Saddam Boss</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#020617] text-white flex items-center justify-center min-h-screen p-4">

    <div id="login-form" class="w-full max-w-sm bg-[#0d1425] p-10 rounded-[50px] border border-white/5 shadow-2xl text-center">
        <h1 class="text-xl font-black text-blue-500 uppercase tracking-widest mb-10 italic">Boss Station</h1>
        <input id="p" type="password" placeholder="PASSWORD" class="w-full bg-black p-5 rounded-3xl text-center font-black tracking-widest outline-none border border-gray-800 mb-8">
        <button onclick="login()" class="w-full bg-blue-600 py-5 rounded-3xl font-black uppercase text-xs tracking-widest">Access Dash</button>
    </div>

    <div id="dashboard" class="hidden w-full max-w-2xl bg-[#0d1425] p-8 md:p-12 rounded-[50px] border border-white/5 shadow-2xl space-y-8">
        <div class="flex justify-between items-center border-b border-white/5 pb-6">
            <h2 class="text-lg font-black text-blue-500 uppercase italic">Master Control</h2>
            <button onclick="save()" class="bg-blue-600 px-8 py-3 rounded-2xl font-black uppercase text-[10px]">Save Updates</button>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="space-y-4">
                <label class="text-[9px] font-black text-gray-500 uppercase">Site Name & Logo</label>
                <input id="site-name" type="text" class="w-full bg-black p-4 rounded-xl border border-gray-800 text-xs">
                
                <label class="text-[9px] font-black text-gray-500 uppercase">Theme Color</label>
                <input id="theme-color" type="color" class="w-full h-12 bg-black p-1 rounded-xl border border-gray-800">
                
                <label class="text-[9px] font-black text-gray-500 uppercase">Announcement Notice</label>
                <input id="notice" type="text" class="w-full bg-black p-4 rounded-xl border border-gray-800 text-xs">
            </div>

            <div class="space-y-4">
                <label class="text-[9px] font-black text-gray-500 uppercase">Adsterra Link</label>
                <input id="ad-link" type="text" class="w-full bg-black p-4 rounded-xl border border-gray-800 text-[10px] text-green-400">
                
                <label class="text-[9px] font-black text-gray-500 uppercase">Ad Status & Timer</label>
                <div class="flex gap-4">
                    <select id="ad-status" class="bg-black p-4 rounded-xl border border-gray-800 text-xs font-bold flex-1">
                        <option value="on">AD ON</option>
                        <option value="off">AD OFF</option>
                    </select>
                    <input id="skip-timer" type="number" class="w-20 bg-black p-4 rounded-xl border border-gray-800 text-center font-bold">
                </div>

                <label class="text-[9px] font-black text-gray-500 uppercase">YouTube Channel ID (UC...)</label>
                <input id="channel-id" type="text" class="w-full bg-black p-4 rounded-xl border border-gray-800 text-xs text-red-400">
            </div>
        </div>
    </div>

<script>
    firebase.initializeApp({ databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" });
    const db = firebase.database();

    function login(){ if(document.getElementById('p').value === 'saddam786'){ document.getElementById('login-form').style.display='none'; document.getElementById('dashboard').classList.remove('hidden'); load(); } }
    
    function load(){
        db.ref('settings').once('value', s => {
            const d = s.val(); if(!d) return;
            document.getElementById('site-name').value = d.siteName || "";
            document.getElementById('theme-color').value = d.themeColor || "#3b82f6";
            document.getElementById('notice').value = d.notice || "";
            document.getElementById('ad-link').value = d.adLink || "";
            document.getElementById('ad-status').value = d.adStatus || "on";
            document.getElementById('skip-timer').value = d.skipTimer || 10;
            document.getElementById('channel-id').value = d.channelId || "";
        });
    }

    function save(){
        const data = {
            siteName: document.getElementById('site-name').value,
            themeColor: document.getElementById('theme-color').value,
            notice: document.getElementById('notice').value,
            adLink: document.getElementById('ad-link').value,
            adStatus: document.getElementById('ad-status').value,
            skipTimer: parseInt(document.getElementById('skip-timer').value),
            channelId: document.getElementById('channel-id').value,
            liveText: "Server Active"
        };
        db.ref('settings').set(data).then(() => alert("Master Update Success!"));
    }
</script>
</body>
                </html>
