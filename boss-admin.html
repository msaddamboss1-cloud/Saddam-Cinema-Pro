      <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Saddam Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#020617] text-white flex items-center justify-center min-h-screen">
    <div class="w-full max-w-sm bg-[#0d1425] p-10 rounded-[40px] border border-white/5 shadow-2xl space-y-6">
        <h1 class="text-xl font-black text-blue-500 uppercase text-center">Control Station</h1>
        <input id="p" type="password" placeholder="PASSWORD" class="w-full bg-black p-4 rounded-xl text-center outline-none border border-gray-800">
        <div id="m-panel" class="hidden space-y-4">
            <input id="c" type="text" placeholder="Youtube Channel Link" class="w-full bg-black p-4 rounded-xl text-xs border border-gray-800">
            <select id="s" class="w-full bg-black p-4 rounded-xl text-xs border border-gray-800">
                <option value="on">AD ON</option>
                <option value="off">AD OFF</option>
            </select>
            <button onclick="update()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs">Update Live</button>
        </div>
        <button id="l-btn" onclick="login()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs">Login</button>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyB7w62sre73EzNY7TsvHfg88sjVrzPTcSM", databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com", projectId: "saddam-premium-hub" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            if(document.getElementById('p').value === 'saddam786') {
                document.getElementById('m-panel').classList.remove('hidden');
                document.getElementById('l-btn').classList.add('hidden');
                document.getElementById('p').classList.add('hidden');
            } else { alert("Wrong Password!"); }
        }

        function update() {
            const data = { channelId: document.getElementById('c').value, status: document.getElementById('s').value, timer: 10 };
            db.ref('settings').set(data)
                .then(() => alert("সাকসেস! ওয়েবসাইট আপডেট হয়েছে।"))
                .catch(e => alert("Error: ফায়ারবেস পারমিশন চেক করুন!"));
        }
    </script>
</body>
</html>
