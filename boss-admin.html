               <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Saddam Boss | Control Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#020617] text-white flex items-center justify-center min-h-screen p-6">

    <div id="login-screen" class="w-full max-w-sm bg-[#0d1425] p-12 rounded-[50px] border border-white/5 shadow-2xl text-center">
        <h2 class="text-2xl font-black text-blue-500 uppercase tracking-[0.2em] mb-10">Boss Only</h2>
        <input id="p-word" type="password" placeholder="PASSWORD" class="w-full bg-black p-5 rounded-2xl border border-gray-800 text-center font-black tracking-widest outline-none focus:border-blue-500 mb-6">
        <button onclick="enter()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-xs">Login Now</button>
    </div>

    <div id="panel-screen" class="hidden w-full max-w-xl bg-[#0d1425] p-10 rounded-[50px] border border-white/5 shadow-2xl space-y-8">
        <div class="flex justify-between items-center border-b border-white/5 pb-6">
            <h1 class="text-xl font-black text-blue-500 uppercase">Control Station</h1>
            <div class="px-4 py-1 bg-blue-500/10 text-blue-400 rounded-full text-[9px] font-black uppercase tracking-widest border border-blue-500/20">Active Server</div>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-3 block">YouTube Channel Link/ID</label>
                <input id="c-link" type="text" class="w-full bg-black p-5 rounded-2xl border border-gray-800 outline-none text-xs text-blue-400">
            </div>
            
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-3 block">Entry Ad Status</label>
                    <select id="a-status" class="w-full bg-black p-5 rounded-2xl border border-gray-800 text-xs font-bold">
                        <option value="on">ACTIVE (ON)</option>
                        <option value="off">OFF</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-3 block">Skip Timer (Sec)</label>
                    <input id="a-timer" type="number" class="w-full bg-black p-5 rounded-2xl border border-gray-800 text-center font-bold">
                </div>
            </div>
        </div>

        <button onclick="update()" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase text-[10px] tracking-[0.3em] shadow-xl shadow-blue-500/20 active:scale-95 transition-all">Update Website Live</button>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyB7w62sre73EzNY7TsvHfg88sjVrzPTcSM", 
            databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com",
            projectId: "saddam-premium-hub" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function enter() {
            if(document.getElementById('p-word').value === 'saddam786') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel-screen').style.display = 'block';
                load();
            } else { alert("WRONG PASSWORD!"); }
        }

        function load() {
            db.ref('settings').once('value', s => {
                const d = s.val();
                if(d) {
                    document.getElementById('c-link').value = d.channelId;
                    document.getElementById('a-status').value = d.status;
                    document.getElementById('a-timer').value = d.timer;
                }
            });
        }

        function update() {
            const d = {
                channelId: document.getElementById('c-link').value,
                status: document.getElementById('a-status').value,
                timer: document.getElementById('a-timer').value,
                link: "https://www.profitablecpmrate.com/un4f76p6p?key=f0b83b8b6f79986b5952e46049a463a6" // Auto Save
            };
            db.ref('settings').set(d).then(() => alert("DONE: WEBSITE UPDATED!"));
        }
    </script>
</body>
</html>
