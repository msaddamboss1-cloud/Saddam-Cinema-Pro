<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saddam Boss Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#020617] text-white p-4 font-sans">

<div id="login" class="max-w-xs mx-auto mt-20 text-center space-y-6">
    <h1 class="text-2xl font-black italic text-blue-500">BOSS LOGIN</h1>
    <input id="pass" type="password" placeholder="PASSWORD" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl text-center outline-none focus:border-blue-500">
    <button onclick="checkPass()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold uppercase tracking-widest">Access Dash</button>
</div>

<div id="dash" class="hidden max-w-lg mx-auto space-y-6 pb-20">
    <header class="flex justify-between items-center bg-[#0f172a] p-5 rounded-3xl border border-white/5">
        <h2 class="font-black text-blue-500 italic">SADDAM BOSS</h2>
        <button onclick="save()" class="bg-blue-600 px-6 py-2 rounded-xl text-[10px] font-bold uppercase">Update Site</button>
    </header>

    <div class="bg-[#0f172a] p-6 rounded-3xl space-y-4 border border-white/5">
        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest border-b border-white/5 pb-2">মুভি ও চ্যানেল কন্ট্রোল</h3>
        <input id="siteName" placeholder="সাইটের নাম" class="w-full bg-black p-4 rounded-xl text-sm border border-gray-800">
        <input id="channelId" placeholder="চ্যানেল আইডি (UC...)" class="w-full bg-black p-4 rounded-xl text-sm border border-gray-800 text-red-400">
        <div class="flex items-center justify-between p-2">
            <span class="text-xs text-gray-400">ডাউনলোড বাটন:</span>
            <select id="dlStatus" class="bg-black p-2 rounded-lg text-xs">
                <option value="on">চালু</option>
                <option value="off">বন্ধ</option>
            </select>
        </div>
    </div>

    <div class="bg-[#0f172a] p-6 rounded-3xl space-y-4 border border-white/5">
        <h3 class="text-xs font-bold text-green-500 uppercase tracking-widest border-b border-white/5 pb-2">অ্যাডভার্টাইজিং মাস্টার</h3>
        <input id="adLink" placeholder="Adsterra ডিরেক্ট লিঙ্ক" class="w-full bg-black p-4 rounded-xl text-xs border border-gray-800 text-green-500">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-[9px] text-gray-500 block mb-1 uppercase">অ্যাড স্ট্যাটাস</label>
                <select id="adStatus" class="w-full bg-black p-4 rounded-xl text-xs border border-gray-800">
                    <option value="on">চালু</option>
                    <option value="off">বন্ধ</option>
                </select>
            </div>
            <div>
                <label class="text-[9px] text-gray-500 block mb-1 uppercase">অ্যাড টাইমার (সেকেন্ড)</label>
                <input id="skipTimer" type="number" class="w-full bg-black p-4 rounded-xl text-xs border border-gray-800">
            </div>
        </div>
        <div>
            <label class="text-[9px] text-gray-500 block mb-1 uppercase">অ্যাড বক্স সাইজ (%)</label>
            <input id="adBoxSize" type="range" min="30" max="100" class="w-full">
        </div>
    </div>

    <div class="bg-[#0f172a] p-6 rounded-3xl border border-white/5 grid grid-cols-2 gap-4">
        <div class="text-center p-4 bg-black/40 rounded-2xl">
            <p class="text-[9px] text-gray-500 uppercase">লাইভ ইউজার</p>
            <p id="live-count" class="text-2xl font-black text-blue-500">0</p>
        </div>
        <div class="text-center p-4 bg-black/40 rounded-2xl">
            <p class="text-[9px] text-gray-500 uppercase">মোট মুভি</p>
            <p id="movie-count" class="text-2xl font-black text-green-500">0</p>
        </div>
    </div>
</div>

<script>
    firebase.initializeApp({ databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" });
    const db = firebase.database();

    function checkPass() {
        if(document.getElementById('pass').value === 'saddam786') {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');
            loadData();
        } else { alert("ভুল পাসওয়ার্ড!"); }
    }

    function loadData() {
        db.ref('settings').on('value', snap => {
            const d = snap.val(); if(!d) return;
            document.getElementById('siteName').value = d.siteName || "";
            document.getElementById('channelId').value = d.channelId || "";
            document.getElementById('adLink').value = d.adLink || "";
            document.getElementById('adStatus').value = d.adStatus || "on";
            document.getElementById('skipTimer').value = d.skipTimer || 10;
            document.getElementById('adBoxSize').value = d.adBoxSize || 80;
            document.getElementById('dlStatus').value = d.dlStatus || "on";
        });
        db.ref('online_users').on('value', s => {
            document.getElementById('live-count').innerText = s.numChildren();
        });
    }

    function save() {
        const data = {
            siteName: document.getElementById('siteName').value,
            channelId: document.getElementById('channelId').value,
            adLink: document.getElementById('adLink').value,
            adStatus: document.getElementById('adStatus').value,
            skipTimer: parseInt(document.getElementById('skipTimer').value),
            adBoxSize: parseInt(document.getElementById('adBoxSize').value),
            dlStatus: document.getElementById('dlStatus').value
        };
        db.ref('settings').set(data).then(() => alert("সাফল্যের সাথে আপডেট হয়েছে!"));
    }
</script>
</body>
</html>
