<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Owner Master Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-black text-white p-8">
    <div class="max-w-md mx-auto space-y-8 pb-20">
        <div class="bg-blue-600 p-8 rounded-[40px] shadow-2xl flex justify-between items-center">
            <h1 class="font-black italic text-xl uppercase tracking-tighter">Saddam Admin</h1>
            <div class="bg-black/20 px-4 py-2 rounded-2xl text-[10px] font-bold uppercase">Live: <span id="adm-live">0</span></div>
        </div>

        <div class="bg-gray-900 p-7 rounded-[40px] border border-white/5 space-y-4">
            <h3 class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">System Security</h3>
            <input id="new-wp" placeholder="Set Worker Login Password" class="w-full bg-black p-4 rounded-2xl text-xs border border-white/5">
            <button onclick="db.ref('settings').update({workerPass: document.getElementById('new-wp').value}); alert('Updated!')" class="w-full bg-blue-600 p-4 rounded-2xl font-black uppercase text-[10px]">Update Password</button>
        </div>

        <div class="bg-gray-900 p-7 rounded-[40px] border border-white/5 space-y-4">
            <h3 class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Broadcast & Ads</h3>
            <input id="site-note" placeholder="Write Notice Text..." class="w-full bg-black p-4 rounded-2xl text-xs border border-white/5">
            <input id="adsterra-js" placeholder="Adsterra JS Script Link" class="w-full bg-black p-4 rounded-2xl text-xs border border-white/5">
            <div class="grid grid-cols-2 gap-3">
                <select id="gs-opt" class="bg-black p-4 rounded-2xl text-[10px] font-bold border border-white/5"><option value="on">Gate Ads: ON</option><option value="off">OFF</option></select>
                <select id="ds-opt" class="bg-black p-4 rounded-2xl text-[10px] font-bold border border-white/5"><option value="on">DL Ads: ON</option><option value="off">OFF</option></select>
            </div>
            <button onclick="saveAll()" class="w-full bg-indigo-600 p-4 rounded-2xl font-black uppercase text-[10px]">Save Site Settings</button>
        </div>

        <div class="bg-gray-900 p-7 rounded-[40px] border border-white/5">
            <h3 class="text-[10px] font-bold text-blue-500 uppercase mb-5">Active Workers</h3>
            <div id="w-list-box" class="space-y-3"></div>
        </div>

        <div class="bg-gray-900 p-7 rounded-[40px] border border-white/5">
            <h3 class="text-[10px] font-bold text-blue-500 uppercase mb-5 uppercase tracking-widest">Movie Archive</h3>
            <input type="text" id="adm-search" onkeyup="admSearch()" placeholder="Search movie to delete..." class="w-full bg-black p-4 rounded-2xl mb-4 text-xs border border-white/5 outline-none">
            <div id="adm-movie-list" class="space-y-2 max-h-80 overflow-y-auto pr-2"></div>
        </div>
    </div>

<script>
    firebase.initializeApp({ databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" });
    const db = firebase.database();

    db.ref('status/live').on('value', s => document.getElementById('adm-live').innerText = s.numChildren());

    function saveAll() {
        db.ref('settings').update({ notice: document.getElementById('site-note').value, adUrl: document.getElementById('adsterra-js').value, gateStatus: document.getElementById('gs-opt').value, dlAd: document.getElementById('ds-opt').value });
        alert("Site Settings Updated!");
    }

    db.ref('workers').on('value', snap => {
        const box = document.getElementById('w-list-box'); box.innerHTML = "";
        snap.forEach(c => {
            const w = c.val();
            box.innerHTML += `<div class="flex justify-between items-center bg-black/40 p-4 rounded-2xl border border-white/5">
                <span class="text-[9px] truncate w-2/3 opacity-70">${w.email}</span>
                <button onclick="db.ref('workers/${c.key}').update({status: '${w.status === 'active' ? 'banned' : 'active'}'})" class="px-4 py-2 rounded-xl text-[8px] font-black ${w.status === 'active' ? 'bg-red-600' : 'bg-green-600'}">${w.status === 'active' ? 'BLOCK' : 'UNBLOCK'}</button>
            </div>`;
        });
    });

    db.ref('movies').on('value', snap => {
        const box = document.getElementById('adm-movie-list'); box.innerHTML = "";
        snap.forEach(c => {
            box.innerHTML += `<div class="adm-item flex justify-between items-center bg-black/40 p-4 rounded-2xl border border-white/5" data-name="${c.val().name.toLowerCase()}">
                <span class="text-[9px] truncate w-2/3 font-bold uppercase">${c.val().name}</span>
                <button onclick="db.ref('movies/${c.key}').remove()" class="bg-red-900/50 text-red-400 px-4 py-2 rounded-xl text-[8px] font-black border border-red-500/20">DELETE</button>
            </div>`;
        });
    });

    function admSearch() {
        const q = document.getElementById('adm-search').value.toLowerCase();
        document.querySelectorAll('.adm-item').forEach(i => i.style.display = i.getAttribute('data-name').includes(q) ? 'flex' : 'none');
    }
</script>
</body>
</html>
