<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-black text-white p-6">
    <div class="max-w-md mx-auto space-y-6">
        <div class="bg-blue-600 p-6 rounded-[35px] flex justify-between items-center shadow-2xl">
            <h2 class="font-black italic uppercase">Control V11</h2>
            <div class="bg-black/40 px-4 py-2 rounded-xl text-[10px] font-bold">LIVE USERS: <span id="m-count">0</span></div>
        </div>
        
        <div class="bg-[#111] p-6 rounded-[35px] space-y-4 border border-white/5">
            <label class="text-[10px] text-gray-500 font-bold uppercase">Ad Timer (Seconds)</label>
            <input id="tm" type="number" class="w-full bg-black p-4 rounded-2xl border border-white/5">
            
            <label class="text-[10px] text-gray-500 font-bold uppercase">Ad Status</label>
            <select id="as" class="w-full bg-black p-4 rounded-2xl border border-white/5">
                <option value="on">AD ENABLED</option>
                <option value="off">AD DISABLED</option>
            </select>
            
            <label class="text-[10px] text-gray-500 font-bold uppercase">Adsterra JS Link Only</label>
            <input id="ga" placeholder="https://pl2882...js" class="w-full bg-black p-4 rounded-2xl border border-white/5 font-mono text-xs">
            
            <button onclick="save()" class="w-full bg-blue-600 p-5 rounded-2xl font-black uppercase tracking-widest">Save All Settings</button>
        </div>
    </div>
<script>
    firebase.initializeApp({ databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" });
    const db = firebase.database();

    db.ref('settings').on('value', s => {
        const d = s.val() || {};
        document.getElementById('tm').value = d.timer || 10;
        document.getElementById('as').value = d.adStatus || "on";
        document.getElementById('ga').value = d.gateAd || "";
    });

    db.ref('status/online').on('value', s => { document.getElementById('m-count').innerText = s.numChildren(); });

    function save(){
        db.ref('settings').update({
            timer: parseInt(document.getElementById('tm').value),
            adStatus: document.getElementById('as').value,
            gateAd: document.getElementById('ga').value
        }).then(() => alert("Settings Updated!"));
    }
</script>
</body>
</html>
