<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-black text-white p-5">
    <div class="max-w-lg mx-auto space-y-6">
        <div class="bg-blue-600 p-6 rounded-[30px] flex justify-between items-center">
            <h2 class="font-black italic uppercase">Admin Control V12</h2>
            <div class="bg-black px-4 py-2 rounded-xl text-xs">USERS LIVE: <span id="master-online">0</span></div>
        </div>
        
        <div class="bg-gray-900 p-6 rounded-[30px] space-y-4 border border-white/5">
            <input id="st" type="number" placeholder="Timer" class="w-full bg-black p-4 rounded-xl border border-gray-800">
            <select id="ss" class="w-full bg-black p-4 rounded-xl border border-gray-800">
                <option value="on">AD ON</option><option value="off">AD OFF</option>
            </select>
            <textarea id="sb1" placeholder="Paste Adsterra Script Here" class="w-full h-32 bg-black p-4 rounded-xl border border-gray-800 font-mono text-[10px]"></textarea>
            <button onclick="update()" class="w-full bg-blue-600 p-4 rounded-2xl font-black">SAVE ALL SETTINGS</button>
        </div>
    </div>
<script>
    firebase.initializeApp({ databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" });
    const db = firebase.database();

    db.ref('settings').on('value', s => {
        const d = s.val() || {};
        document.getElementById('st').value = d.timer || 10;
        document.getElementById('ss').value = d.adStatus || "on";
        document.getElementById('sb1').value = d.ban1 || "";
    });

    db.ref('status/users').on('value', s => { 
        document.getElementById('master-online').innerText = s.numChildren(); 
    });

    function update(){
        db.ref('settings').update({
            timer: parseInt(document.getElementById('st').value),
            adStatus: document.getElementById('ss').value,
            ban1: document.getElementById('sb1').value
        }).then(() => alert("Saved!"));
    }
</script>
</body>
</html>
