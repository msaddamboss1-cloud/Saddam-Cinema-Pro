
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Worker Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#020617] text-white p-6">
    <div id="ban-msg" class="hidden fixed inset-0 bg-red-600 flex items-center justify-center p-10 text-center font-black text-2xl z-[9999]">
        আপনাকে এডমিন বের করে দিয়েছে, এডমিনের সঙ্গে যোগাযোগ করুন।
    </div>
    <div id="app-box" class="max-w-md mx-auto space-y-4">
        <h2 class="text-blue-500 font-black uppercase text-center mb-8">Worker Portal</h2>
        <input id="w-email" placeholder="Your Gmail" class="w-full p-4 bg-slate-900 rounded-2xl border border-white/10 outline-none">
        <hr class="opacity-10">
        <input id="m-name" placeholder="Movie Name" class="w-full p-4 bg-slate-900 rounded-2xl border border-white/10 outline-none">
        <input id="m-thumb" placeholder="Poster/Thumbnail URL" class="w-full p-4 bg-slate-900 rounded-2xl border border-white/10 outline-none">
        <input id="m-s1" placeholder="Google Drive Share Link (Server 1)" class="w-full p-4 bg-slate-900 rounded-2xl border border-white/10 outline-none">
        <input id="m-s2" placeholder="Google Drive Share Link (Server 2) - Optional" class="w-full p-4 bg-slate-900 rounded-2xl border border-white/10 outline-none">
        <button onclick="publish()" class="w-full bg-blue-600 p-5 rounded-2xl font-black uppercase">Publish Movie</button>
    </div>

<script>
    firebase.initializeApp({ databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" });
    const db = firebase.database();

    function driveFix(link) {
        if(link.includes('drive.google.com')){
            const id = link.split('/d/')[1].split('/')[0];
            return `https://drive.google.com/uc?export=download&id=${id}`;
        }
        return link;
    }

    function publish() {
        const email = document.getElementById('w-email').value;
        const name = document.getElementById('m-name').value;
        const s1 = driveFix(document.getElementById('m-s1').value);
        const s2 = driveFix(document.getElementById('m-s2').value);
        
        if(!email || !name || !s1) return alert("Fill required fields!");

        // Check if banned
        db.ref('workers').orderByChild('email').equalTo(email).once('value', s => {
            let banned = false;
            s.forEach(c => { if(c.val().status === 'banned') banned = true; });
            
            if(banned) {
                document.getElementById('app-box').classList.add('hidden');
                document.getElementById('ban-msg').classList.remove('hidden');
            } else {
                db.ref('movies').push({ name, thumb: document.getElementById('m-thumb').value, s1, s2, worker: email });
                db.ref('workers').child(email.replace(/\./g, '_')).set({ email, status: 'active', lastPost: Date.now() });
                alert("Published Successfully!");
            }
        });
    }
</script>
</body>
</html>
