<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Worker Portal - Saddam OTT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#020617] text-white p-6">

    <div id="login-section" class="max-w-xs mx-auto mt-20 space-y-4">
        <h2 class="text-2xl font-black text-blue-500 text-center uppercase">Worker Entry</h2>
        <input id="email" type="email" placeholder="Enter Gmail" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 outline-none">
        <input id="pass" type="password" placeholder="Set Password" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 outline-none">
        <button onclick="handleAuth()" class="w-full bg-blue-600 p-4 rounded-2xl font-black shadow-lg">CONTINUE</button>
    </div>

    <div id="pin-section" class="hidden max-w-xs mx-auto mt-20 space-y-4 text-center">
        <h2 class="font-bold text-yellow-500">Security Check</h2>
        <p class="text-[10px] text-gray-400">এডমিনের দেয়া ৫ সংখ্যার পিনটি বসান</p>
        <input id="v-pin" type="password" placeholder="Enter Secret PIN" class="w-full p-4 bg-slate-900 rounded-2xl border border-yellow-600 outline-none text-center font-bold tracking-[10px]">
        <button onclick="verifyPin()" class="w-full bg-yellow-600 p-4 rounded-2xl font-black">VERIFY & ENTER</button>
    </div>

    <div id="dash-section" class="hidden max-w-md mx-auto space-y-4 pb-20">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-green-500 font-black italic">UPLOAD SYSTEM</h2>
            <span id="user-display" class="text-[10px] bg-slate-800 px-3 py-1 rounded-full"></span>
        </div>
        <input id="mName" placeholder="Movie Name" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800">
        <input id="mThumb" placeholder="Thumbnail Link" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800">
        <input id="mDL" placeholder="Chrome Direct Download Link" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800">
        <button onclick="uploadMovie()" class="w-full bg-blue-600 p-5 rounded-[25px] font-black text-sm shadow-xl shadow-blue-600/20 active:scale-95 transition">UPLOAD & PUBLISH</button>
    </div>

<script>
    firebase.initializeApp({ databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    let loggedUser = "";

    function handleAuth() {
        const mail = document.getElementById('email').value.replace(/\./g, ',');
        const psw = document.getElementById('pass').value;
        if(!mail.includes('@') || psw.length < 4) return alert("সঠিক ইমেইল ও পাসওয়ার্ড দিন!");

        db.ref('workers/' + mail).once('value', s => {
            const d = s.val();
            if(d && d.status === 'banned') return alert("ব্যান করা হয়েছে! মালিকের সাথে যোগাযোগ করুন।");
            if(d && d.password !== psw) return alert("ভুল পাসওয়ার্ড!");

            // নতুন হলে রেজিস্ট্রেশন হবে, পুরাতন হলে লগইন
            loggedUser = mail;
            if(!d) db.ref('workers/'+mail).set({email: mail.replace(/,/g,'.'), password: psw, status: 'active'});
            
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('pin-section').classList.remove('hidden');
        });
    }

    function verifyPin() {
        const pinIn = document.getElementById('v-pin').value;
        db.ref('settings/workerCode').once('value', s => {
            if(pinIn === s.val()) {
                document.getElementById('pin-section').classList.add('hidden');
                document.getElementById('dash-section').classList.remove('hidden');
                document.getElementById('user-display').innerText = loggedUser.replace(/,/g,'.');
            } else { alert("পিন ভুল! এডমিন থেকে সঠিক পিন নিন।"); }
        });
    }

    function uploadMovie() {
        const name = document.getElementById('mName').value;
        const thumb = document.getElementById('mThumb').value;
        const dl = document.getElementById('mDL').value;
        if(!name || !thumb || !dl) return alert("সব ঘর পূরণ করুন!");

        db.ref('movies').push({
            name: name, thumb: thumb, download: dl, by: loggedUser.replace(/,/g,'.')
        }).then(() => { alert("সফলভাবে আপলোড হয়েছে!"); location.reload(); });
    }
</script>
</body>
</html>
