
              <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema - Global Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="https://pl28829392.effectivegatecpm.com/bb/89/3d/bb893dececb6b558f2452b165b3a0956.js" async></script>
    <script src="https://pl28803039.effectivegatecpm.com/a0/aa/e3/a0aae346dc10b523504506174de70ea5.js" async></script>
    <script src="https://pl28833438.effectivegatecpm.com/28/4f/77/284f777a926c2a7bd6eceffffd8a2b63.js" async></script>

    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* 1. Magic Header Logic */
        #main-nav {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 5000;
            background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-up { transform: translateY(-100%); }

        /* 2. Full Screen Ad Gate (90% Display) */
        #ad-gate-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; 
            display: none; align-items: center; justify-content: center;
        }
        #ad-gate-box {
            width: 92%; height: 85%; background: #0f172a; border-radius: 35px;
            border: 2px solid #3b82f6; overflow: hidden; position: relative;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.3);
        }

        /* 3. Bottom Sticky Ad Box (Income Center) */
        #income-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 100px;
            background: #0f172a; border-top: 2px solid #3b82f6; z-index: 4000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .movie-card { background: #0f172a; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .blur-content { filter: blur(15px); pointer-events: none; }
    </style>
</head>
<body class="pb-32">

<div id="ad-gate-overlay">
    <div id="ad-gate-box" class="flex flex-col">
        <div class="flex-grow bg-black relative">
            <iframe id="ad-iframe" src="" class="w-full h-full border-none"></iframe>
            <div id="loader-msg" class="absolute inset-0 flex flex-col items-center justify-center bg-black">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-3"></div>
                <p class="text-[9px] font-bold text-blue-400 tracking-widest uppercase">Income Generating Ad Loading...</p>
            </div>
        </div>
        <div class="p-5 bg-slate-900 flex justify-between items-center">
            <div class="text-[10px] font-black text-blue-500">SYSTEM UNLOCK IN: <span id="sec-count">10</span>S</div>
            <button id="close-ad-btn" disabled class="bg-gray-800 px-10 py-3 rounded-2xl text-[10px] font-black uppercase opacity-40 transition-all">Skip</button>
        </div>
    </div>
</div>

<header id="main-nav" class="p-5">
    <div class="flex justify-between items-center mb-5 px-1">
        <h1 class="text-2xl font-black italic text-blue-500">SADDAM CINEMA</h1>
        <div class="bg-blue-600/10 px-4 py-2 rounded-full border border-blue-500/20 text-[10px] font-bold text-blue-400 tracking-widest uppercase">Live <span id="user-live">1</span></div>
    </div>
    
    <div class="relative mb-5">
        <input type="text" id="search-box" onkeyup="searchFn()" placeholder="Search movies, series..." class="w-full bg-slate-900 border border-white/5 p-4 pl-12 rounded-2xl text-[12px] outline-none focus:border-blue-600 transition-all">
        <span class="absolute left-4 top-4 opacity-30">🔍</span>
    </div>

    <div class="flex gap-3 overflow-x-auto no-scrollbar pb-1">
        <button onclick="tabFilter('All')" class="tab-item bg-blue-600 px-7 py-3 rounded-full text-[10px] font-black uppercase">All</button>
        <button onclick="tabFilter('Action')" class="tab-item bg-white/5 px-7 py-3 rounded-full text-[10px] font-black border border-white/10 uppercase">Action</button>
        <button onclick="tabFilter('Horror')" class="tab-item bg-white/5 px-7 py-3 rounded-full text-[10px] font-black border border-white/10 uppercase">Horror</button>
        <button onclick="tabFilter('South')" class="tab-item bg-white/5 px-7 py-3 rounded-full text-[10px] font-black border border-white/10 uppercase">South</button>
    </div>
</header>

<main class="p-5 pt-52 grid grid-cols-1 gap-10" id="movie-display"></main>

<div id="income-bar">
    <div id="container-a0aae346dc10b523504506174de70ea5"></div>
    <div class="text-[8px] font-black text-blue-500/20 uppercase mt-1 tracking-widest italic">Protected Sponsored Space</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- MAGIC NAVIGATION (Hide on Scroll Down, Show on Scroll Up) ---
    let lastPos = window.pageYOffset;
    window.onscroll = () => {
        let currentPos = window.pageYOffset;
        if (lastPos > currentPos) { document.getElementById('main-nav').classList.remove('nav-up'); }
        else { if(currentPos > 200) document.getElementById('main-nav').classList.add('nav-up'); }
        lastPos = currentPos;
    };

    // --- MASTER AD TRIGGER ---
    function triggerIncomeGate(directLink) {
        db.ref('settings').once('value', snap => {
            const data = snap.val() || {};
            if(data.gateStatus === 'on') {
                const overlay = document.getElementById('ad-gate-overlay');
                overlay.style.display = 'flex';
                document.getElementById('ad-iframe').src = data.adUrl;
                document.getElementById('ad-iframe').onload = () => { document.getElementById('loader-msg').style.display = 'none'; };

                let sec = 10;
                const timer = setInterval(() => {
                    sec--; document.getElementById('sec-count').innerText = sec;
                    if(sec <= 0) {
                        clearInterval(timer);
                        const btn = document.getElementById('close-ad-btn');
                        btn.disabled = false; btn.classList.replace('bg-gray-800', 'bg-blue-600'); btn.classList.remove('opacity-40');
                        btn.onclick = () => {
                            overlay.style.display = 'none';
                            if(directLink) window.open(directLink, '_blank');
                        };
                    }
                }, 1000);
            } else if(directLink) { window.open(directLink, '_blank'); }
        });
    }

    // --- MOVIE RENDERER ---
    db.ref('movies').on('value', snap => {
        const grid = document.getElementById('movie-display'); grid.innerHTML = "";
        snap.forEach(child => {
            const m = child.val();
            grid.innerHTML += `
            <div class="movie-card p-5 flex flex-col gap-4 shadow-2xl" data-name="${m.name.toLowerCase()}" data-cat="${m.category}">
                <div class="relative aspect-video rounded-3xl overflow-hidden bg-black" onclick="triggerIncomeGate()">
                    <img src="${m.thumb}" class="w-full h-full object-cover opacity-50">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="bg-blue-600 p-5 rounded-full shadow-2xl transform active:scale-90 transition-transform">▶</div>
                    </div>
                </div>
                <div class="px-1 flex justify-between items-end">
                    <div>
                        <h3 class="text-sm font-black uppercase truncate max-w-[150px]">${m.name}</h3>
                        <p class="text-[9px] text-blue-500 font-bold uppercase tracking-widest mt-1">${m.category || 'PREMIUM'}</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mt-1">
                    <button onclick="triggerIncomeGate('${m.s1}')" class="bg-blue-600 py-4 rounded-2xl text-[9px] font-black uppercase shadow-lg shadow-blue-600/30">Server 1</button>
                    <button onclick="triggerIncomeGate('${m.s2 || m.s1}')" class="bg-slate-800 py-4 rounded-2xl text-[9px] font-black uppercase">Server 2</button>
                </div>
            </div>`;
        });
    });

    // Search & Filter
    function searchFn() {
        let v = document.getElementById('search-box').value.toLowerCase();
        document.querySelectorAll('.movie-card').forEach(c => {
            c.style.display = c.dataset.name.includes(v) ? 'block' : 'none';
        });
    }

    function tabFilter(cat) {
        document.querySelectorAll('.movie-card').forEach(c => {
            c.style.display = (cat === 'All' || c.dataset.cat === cat) ? 'block' : 'none';
        });
        document.querySelectorAll('.tab-item').forEach(t => {
            t.classList.toggle('bg-blue-600', t.innerText === cat);
            t.classList.toggle('bg-white/5', t.innerText !== cat);
        });
    }

    // Live User Data
    const liveRef = db.ref('status/live').push(true); liveRef.onDisconnect().remove();
    db.ref('status/live').on('value', s => document.getElementById('user-live').innerText = s.numChildren() || 1);

    // Initial Ad Entry
    window.onload = () => triggerIncomeGate();
</script>
</body>
</html>
