<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .m-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 20px; transition: 0.3s; }
        #gate-ad { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="gate-ad">
    <div class="w-[90%] max-w-sm bg-slate-900 border border-blue-500 rounded-[30px] overflow-hidden shadow-2xl">
        <div id="ad-frame" class="h-64 flex items-center justify-center text-[10px] text-gray-500 italic">AD LOADING...</div>
        <div class="p-5 flex justify-between items-center bg-slate-800">
            <span id="timer" class="text-xs font-bold text-blue-400">WAIT: 10s</span>
            <button id="skip" disabled class="bg-gray-700 px-6 py-2 rounded-xl text-[10px] font-black opacity-50 uppercase">Skip Ad</button>
        </div>
    </div>
</div>

<nav class="p-6 sticky top-0 bg-[#020617]/90 backdrop-blur-md z-50">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-black italic text-blue-500 uppercase">Saddam Cinema</h1>
        <div class="bg-blue-600/20 px-3 py-1 rounded-full text-[10px] font-bold text-blue-400 border border-blue-500/30">ONLINE: <span id="live">0</span></div>
    </div>
    <input type="text" id="search" onkeyup="doSearch()" placeholder="Search movies..." class="w-full bg-slate-900/50 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500 transition-all">
</nav>

<div id="movie-list" class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6"></div>

<script>
    const firebaseConfig = { databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Settings & Ads
    db.ref('settings').on('value', s => {
        const d = s.val() || {};
        if(d.gateStatus === 'on') {
            document.getElementById('gate-ad').style.display = 'flex';
            document.getElementById('ad-frame').innerHTML = `<script src="${d.adUrl}"><\/script>`;
            let t = d.timer || 10;
            const iv = setInterval(() => {
                t--; document.getElementById('timer').innerText = `WAIT: ${t}s`;
                if(t <= 0) {
                    clearInterval(iv);
                    const b = document.getElementById('skip');
                    b.disabled = false; b.classList.replace('bg-gray-700', 'bg-blue-600'); b.classList.remove('opacity-50');
                    b.onclick = () => document.getElementById('gate-ad').style.display = 'none';
                }
            }, 1000);
        }
    });

    // Movie Display
    db.ref('movies').on('value', snap => {
        const list = document.getElementById('movie-list'); list.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            list.innerHTML += `
            <div class="m-card" data-name="${m.name.toLowerCase()}">
                <video controls poster="${m.thumb}" class="w-full aspect-video rounded-xl mb-4 bg-black"><source src="${m.s1}"></video>
                <h3 class="text-xs font-bold uppercase mb-4 opacity-80 truncate">${m.name}</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="handleDL('${m.s1}')" class="bg-blue-600 py-3 rounded-xl text-[9px] font-black uppercase shadow-lg">Server 1</button>
                    <button onclick="handleDL('${m.s2 || m.s1}')" class="bg-slate-800 py-3 rounded-xl text-[9px] font-black uppercase">Server 2</button>
                </div>
            </div>`;
        });
    });

    function handleDL(url) {
        if(!url || url === 'undefined') return alert("Link not available!");
        window.open(url, '_blank');
    }

    function doSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.m-card').forEach(c => c.style.display = c.getAttribute('data-name').includes(q) ? 'block' : 'none');
    }

    const liveRef = db.ref('status/live').push(true); liveRef.onDisconnect().remove();
    db.ref('status/live').on('value', s => document.getElementById('live').innerText = s.numChildren());
</script>
</body>
</html>
