<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema Pro - Premium OTT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #ad-gate { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-blur: 10px; }
        .glass { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.05); backdrop-blur: 8px; }
        .movie-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>

<div id="ad-gate">
    <div class="w-[90%] max-w-sm glass rounded-[40px] p-1 overflow-hidden shadow-2xl border border-blue-500/30">
        <div id="ad-container" class="h-72 flex items-center justify-center text-[10px] text-gray-500 italic uppercase tracking-widest">
            Loading Premium Ad...
        </div>
        <div class="p-6 flex justify-between items-center bg-slate-900/80">
            <span id="gate-timer" class="text-xs font-black text-blue-400 italic">WAIT: 10s</span>
            <button id="skip-gate" disabled class="bg-gray-800 px-8 py-3 rounded-2xl text-[10px] font-black opacity-50 uppercase tracking-widest transition-all">Skip Ad</button>
        </div>
    </div>
</div>

<nav class="p-6 sticky top-0 bg-[#020617]/90 backdrop-blur-xl z-50 border-b border-white/5">
    <div class="max-w-6xl mx-auto flex flex-col gap-4">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-blue-500 tracking-tighter">SADDAM CINEMA <span class="text-white text-[10px] not-italic opacity-40 font-light">V2.0</span></h1>
            <div class="glass px-4 py-2 rounded-full text-[10px] font-bold text-blue-400 border border-blue-500/20">
                LIVE USERS: <span id="live-count">0</span>
            </div>
        </div>
        <input type="text" id="movie-search" onkeyup="searchMovie()" placeholder="Search your favorite movie..." class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500 transition-all text-sm">
    </div>
</nav>

<main class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="movie-display">
    </main>

<script>
    // Firebase Setup
    const firebaseConfig = { databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Ad Control Logic
    db.ref('settings').on('value', snap => {
        const settings = snap.val() || {};
        if(settings.gateStatus === 'on') {
            const gate = document.getElementById('ad-gate');
            gate.style.display = 'flex';
            document.getElementById('ad-container').innerHTML = `<iframe src="${settings.adUrl}" class="w-full h-full border-none"></iframe>`;
            
            let timeLeft = 10;
            const timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('gate-timer').innerText = `WAIT: ${timeLeft}s`;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    const btn = document.getElementById('skip-gate');
                    btn.disabled = false;
                    btn.classList.replace('bg-gray-800', 'bg-blue-600');
                    btn.classList.remove('opacity-50');
                    btn.onclick = () => gate.style.display = 'none';
                }
            }, 1000);
        }
    });

    // 2. Movie Loading Logic
    db.ref('movies').on('value', snap => {
        const display = document.getElementById('movie-display');
        display.innerHTML = "";
        
        snap.forEach(child => {
            const movie = child.val();
            display.innerHTML += `
            <div class="movie-card glass p-5 rounded-[35px] transition-all flex flex-col gap-4" data-name="${movie.name.toLowerCase()}">
                <div class="relative w-full aspect-video rounded-3xl overflow-hidden bg-black border border-white/5">
                    <video controls poster="${movie.thumb || ''}" class="w-full h-full object-cover">
                        <source src="${movie.s1}" type="video/mp4">
                    </video>
                </div>
                <h3 class="text-sm font-black truncate uppercase opacity-90 tracking-tight px-2">${movie.name}</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="window.open('${movie.s1}', '_blank')" class="bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-blue-600/20 transition-all">Server 1</button>
                    <button onclick="window.open('${movie.s2 || movie.s1}', '_blank')" class="bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">Server 2</button>
                </div>
            </div>`;
        });
    });

    // 3. Search Logic
    function searchMovie() {
        const query = document.getElementById('movie-search').value.toLowerCase();
        document.querySelectorAll('.movie-card').forEach(card => {
            card.style.display = card.getAttribute('data-name').includes(query) ? 'flex' : 'none';
        });
    }

    // 4. Live Counter Logic
    const onlineRef = db.ref('status/live').push(true);
    onlineRef.onDisconnect().remove();
    db.ref('status/live').on('value', snap => {
        document.getElementById('live-count').innerText = snap.numChildren();
    });
</script>
</body>
</html>
