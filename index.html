                <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow-x: hidden; }
        #gate-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .video-player { width: 100%; aspect-ratio: 16/9; border-radius: 12px; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="gate-overlay">
    <div class="w-[90%] max-w-sm bg-[#111827] rounded-3xl border border-blue-600/30 overflow-hidden shadow-2xl">
        <div id="ad-box" class="h-64 bg-black flex items-center justify-center">
            <p class="text-[10px] text-gray-500 italic">AD LOADING...</p>
        </div>
        <div class="p-4 flex justify-between items-center bg-[#1f2937]">
            <span id="ad-timer" class="text-xs font-bold text-blue-400 uppercase tracking-widest">Wait: 10s</span>
            <button id="skip-btn" disabled class="bg-gray-700 px-6 py-2 rounded-xl text-[10px] font-black uppercase opacity-50 cursor-not-allowed">Skip Ad</button>
        </div>
    </div>
</div>

<nav class="p-5 flex justify-between items-center border-b border-white/5 sticky top-0 bg-[#020617]/80 backdrop-blur-xl z-50">
    <h1 class="text-xl font-black italic text-blue-500">SADDAM CINEMA PRO</h1>
    <div class="bg-blue-600/10 px-4 py-1.5 rounded-full border border-blue-500/20 text-[10px] font-bold text-blue-400">ONLINE: <span id="u-count">0</span></div>
</nav>

<main class="p-5 grid grid-cols-1 md:grid-cols-3 gap-6" id="movie-grid"></main>

<script>
    const firebaseConfig = { databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // অ্যাড কন্ট্রোল লজিক
    db.ref('settings').on('value', snap => {
        const d = snap.val() || {};
        if(d.adStatus === 'on') {
            const gate = document.getElementById('gate-overlay');
            const skipBtn = document.getElementById('skip-btn');
            const adBox = document.getElementById('ad-box');
            gate.style.display = 'flex';
            
            // অ্যাড স্ক্রিপ্ট ইনজেক্ট করা
            if(d.gateAd) {
                const s = document.createElement('script');
                s.src = d.gateAd;
                adBox.innerHTML = ""; adBox.appendChild(s);
            }

            let timeLeft = d.timer || 10;
            const timerInt = setInterval(() => {
                timeLeft--;
                document.getElementById('ad-timer').innerText = `Wait: ${timeLeft}s`;
                if(timeLeft <= 0) {
                    clearInterval(timerInt);
                    skipBtn.disabled = false;
                    skipBtn.classList.replace('bg-gray-700', 'bg-blue-600');
                    skipBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    skipBtn.onclick = () => { gate.style.display = 'none'; };
                }
            }, 1000);
        }
    });

    // মুভি লোড ও প্লেয়ার লজিক
    db.ref('movies').on('value', snap => {
        const grid = document.getElementById('movie-grid'); grid.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            grid.innerHTML += `
            <div class="bg-white/5 p-4 rounded-3xl border border-white/5">
                <div class="video-player mb-4">
                    <video controls preload="none" poster="${m.thumb}">
                        <source src="${m.link}" type="video/mp4">
                    </video>
                </div>
                <h3 class="text-xs font-bold truncate mb-4 opacity-80">${m.name}</h3>
                <a href="${m.link}" download class="block w-full bg-blue-600 py-3 rounded-2xl text-[10px] font-black text-center uppercase">Direct Download</a>
            </div>`;
        });
    });

    // অনলাইন ইউজার ট্র্যাকিং
    const uRef = db.ref('status/online').push(true); uRef.onDisconnect().remove();
    db.ref('status/online').on('value', s => { document.getElementById('u-count').innerText = s.numChildren(); });
</script>
</body>
</html>
