<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema - Global Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="https://pl28803039.effectivegatecpm.com/a0/aa/e3/a0aae346dc10b523504506174de70ea5.js" async></script>
    <script src="https://pl28833438.effectivegatecpm.com/28/4f/77/284f777a926c2a7bd6eceffffd8a2b63.js" async></script>
    <script src="https://pl28829392.effectivegatecpm.com/bb/89/3d/bb893dececb6b558f2452b165b3a0956.js" async></script>

    <style>
        body { background: #020617; color: white; font-family: sans-serif; padding-bottom: 120px; } /* Space for bottom ad */
        
        /* 90% Overlay Ad */
        #ad-gate { 
            position: fixed; top: 5%; left: 5%; width: 90%; height: 85%; 
            background: #0f172a; z-index: 9999; border-radius: 30px; 
            border: 2px solid #3b82f6; overflow: hidden; display: none;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        /* Bottom Sticky Ad Container */
        #bottom-ad-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 90px;
            background: rgba(15, 23, 42, 0.95); backdrop-blur: 10px;
            z-index: 9000; border-top: 1px solid #3b82f6; display: flex;
            align-items: center; justify-content: center; overflow: hidden;
        }

        .blur-effect { filter: blur(10px); pointer-events: none; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-blur: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="ad-gate">
    <div class="flex flex-col h-full relative">
        <div id="gate-content" class="flex-grow bg-black flex items-center justify-center text-[10px] text-blue-500 italic">
            <iframe id="gate-iframe" src="" class="w-full h-full border-none"></iframe>
        </div>
        <div class="p-4 bg-slate-900 flex justify-between items-center">
            <span id="gate-timer" class="text-xs font-black text-blue-400">WAIT: 10s</span>
            <button id="gate-skip" disabled class="bg-gray-800 px-8 py-3 rounded-xl text-[10px] font-black uppercase opacity-40">Skip Ad</button>
        </div>
    </div>
</div>

<div id="site-wrapper">
    <nav class="p-5 sticky top-0 z-50 glass border-b border-white/5">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-black italic text-blue-500 tracking-tighter uppercase">Saddam Cinema</h1>
            <div class="bg-blue-600/20 px-4 py-2 rounded-full border border-blue-500/30 text-[10px] font-bold text-blue-400">LIVE: <span id="live">0</span></div>
        </div>
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2" id="cat-nav">
            <button onclick="filter('All')" class="bg-blue-600 px-6 py-2 rounded-full text-[10px] font-bold uppercase whitespace-nowrap">All</button>
            <button onclick="filter('Action')" class="bg-white/5 px-6 py-2 rounded-full text-[10px] font-bold border border-white/10 uppercase whitespace-nowrap">Action</button>
            <button onclick="filter('Horror')" class="bg-white/5 px-6 py-2 rounded-full text-[10px] font-bold border border-white/10 uppercase whitespace-nowrap">Horror</button>
            <button onclick="filter('South')" class="bg-white/5 px-6 py-2 rounded-full text-[10px] font-bold border border-white/10 uppercase whitespace-nowrap">South</button>
        </div>
    </nav>

    <main class="p-6 grid grid-cols-1 md:grid-cols-3 gap-8" id="movie-grid"></main>
</div>

<div id="bottom-ad-bar">
    <div id="bottom-script-area" class="w-full h-full flex items-center justify-center text-[8px] text-gray-500 uppercase">
        <div id="container-a0aae346dc10b523504506174de70ea5"></div>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = { databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Ad Control Logic
    db.ref('settings').on('value', s => {
        const d = s.val() || {};
        if(d.gateStatus === 'on') {
            document.getElementById('ad-gate').style.display = 'block';
            document.getElementById('site-wrapper').classList.add('blur-effect');
            document.getElementById('gate-iframe').src = d.adUrl;

            let count = 10;
            const timer = setInterval(() => {
                count--;
                document.getElementById('gate-timer').innerText = `WAIT: ${count}s`;
                if(count <= 0) {
                    clearInterval(timer);
                    const btn = document.getElementById('gate-skip');
                    btn.disabled = false; btn.classList.replace('bg-gray-800','bg-blue-600'); btn.classList.remove('opacity-40');
                    btn.onclick = () => {
                        document.getElementById('ad-gate').style.display = 'none';
                        document.getElementById('site-wrapper').classList.remove('blur-effect');
                    };
                }
            }, 1000);
        }
    });

    // 2. Movie Loading
    db.ref('movies').on('value', s => {
        const grid = document.getElementById('movie-grid'); grid.innerHTML = "";
        s.forEach(c => {
            const m = c.val();
            grid.innerHTML += `
            <div class="movie-card bg-slate-900/50 p-4 rounded-[35px] border border-white/5" data-cat="${m.category}">
                <div class="relative w-full aspect-video rounded-3xl overflow-hidden bg-black mb-4">
                    <video controls poster="${m.thumb}" class="w-full h-full object-cover"><source src="${m.s1}"></video>
                </div>
                <p class="text-[11px] font-black uppercase mb-4 truncate px-2">${m.name}</p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="window.open('${m.s1}')" class="bg-blue-600 py-3 rounded-xl text-[9px] font-black uppercase shadow-lg">Server 1</button>
                    <button onclick="window.open('${m.s2 || m.s1}')" class="bg-slate-800 py-3 rounded-xl text-[9px] font-black uppercase">Server 2</button>
                </div>
            </div>`;
        });
    });

    // 3. Category Filter
    function filter(cat) {
        document.querySelectorAll('.movie-card').forEach(card => {
            card.style.display = (cat === 'All' || card.getAttribute('data-cat') === cat) ? 'block' : 'none';
        });
    }

    // 4. Live Counter
    const lRef = db.ref('status/live').push(true); lRef.onDisconnect().remove();
    db.ref('status/live').on('value', s => document.getElementById('live').innerText = s.numChildren() || 0);
</script>
</body>
</html>
