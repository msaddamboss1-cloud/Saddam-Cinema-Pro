      <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">Saddam OTT Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3b82f6; --ad-size: 80%; }
        body { background: #020617; color: white; overflow-x: hidden; font-family: sans-serif; }
        .ad-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .ad-container { width: var(--ad-size); height: 70%; background: #0f172a; border-radius: 20px; overflow: hidden; border: 2px solid var(--primary); }
        .video-card { background: #0f172a; border-radius: 12px; transition: 0.3s; cursor: pointer; border: 1px solid #1e293b; }
        .video-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        iframe { pointer-events: auto; } /* ইউটিউব রিডাইরেক্ট ঠেকানোর জন্য স্মার্ট ফ্রেম */
    </style>
</head>
<body>

<div id="content-area">
    <nav class="p-4 border-b border-white/5 flex justify-between items-center sticky top-0 bg-[#020617] z-50">
        <h1 id="logo" class="text-xl font-black italic text-blue-500 uppercase">SADDAM</h1>
        <div id="online-count" class="text-[10px] bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20">Users: 0</div>
    </nav>

    <div id="banner-top" class="w-full flex justify-center py-2 min-h-[50px]"></div>

    <main class="max-w-6xl mx-auto p-4">
        <div id="player-box" class="hidden mb-10 space-y-4">
            <div class="aspect-video rounded-3xl overflow-hidden bg-black border border-white/10 shadow-2xl relative">
                <iframe id="main-video" class="w-full h-full" src="" frameborder="0" allow="autoplay; fullscreen" sandbox="allow-forms allow-scripts allow-pointer-lock allow-same-origin"></iframe>
            </div>
            <div class="flex flex-wrap justify-between items-center bg-[#0f172a] p-5 rounded-2xl gap-4">
                <h2 id="playing-title" class="font-bold text-lg"></h2>
                <div class="flex gap-2">
                    <button id="dl-btn" class="bg-green-600 px-6 py-2 rounded-xl font-bold text-xs uppercase">Download</button>
                    <button id="fs-btn" class="bg-gray-700 px-4 py-2 rounded-xl font-bold text-xs">Full Screen</button>
                </div>
            </div>
        </div>

        <div id="video-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
    </main>
</div>

<div id="ad-modal" class="ad-overlay">
    <div class="ad-container flex flex-col">
        <iframe id="ad-frame" class="flex-1 bg-black" src=""></iframe>
        <div class="p-4 bg-[#0f172a] flex justify-between items-center border-t border-white/5">
            <span id="ad-timer" class="text-xs font-bold text-gray-400">WAIT: 10s</span>
            <button id="skip-ad" disabled class="bg-gray-800 text-gray-500 px-8 py-2 rounded-lg font-bold text-xs">PLEASE WAIT</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // অ্যাডস্টেরা পার্মানেন্ট ডিরেক্ট লিঙ্ক
    const MY_AD_LINK = "https://www.profitablecpmrate.com/un4f76p6p?key=f0b83b8b6f79986b5952e46049a463a6";
    let settings = {};

    // লাইভ ইউজার ট্র্যাকিং
    const userRef = db.ref('online_users').push(true);
    userRef.onDisconnect().remove();
    db.ref('online_users').on('value', s => {
        document.getElementById('online-count').innerText = `Users: ${s.numChildren()}`;
    });

    db.ref('settings').on('value', snap => {
        settings = snap.val() || {};
        document.getElementById('site-title').innerText = settings.siteName || "Saddam OTT";
        document.getElementById('logo').innerText = settings.siteName || "SADDAM";
        document.documentElement.style.setProperty('--ad-size', (settings.adBoxSize || 80) + '%');
        
        // ব্যানার অ্যাড লোড
        if(settings.adStatus === 'on') {
            document.getElementById('banner-top').innerHTML = `<iframe src="${MY_AD_LINK}" width="320" height="50" frameborder="0"></iframe>`;
        }

        if(settings.channelId) loadChannel(settings.channelId);
    });

    function loadChannel(cid) {
        const id = cid.includes('UC') ? cid : cid.split('/').pop();
        fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id='+id)}`)
        .then(r => r.json()).then(data => {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = "";
            data.items.forEach(v => {
                const vidId = v.link.split('v=')[1];
                grid.innerHTML += `
                <div class="video-card" onclick="triggerAd('${vidId}', '${v.title.replace(/'/g, "")}')">
                    <img src="https://img.youtube.com/vi/${vidId}/mqdefault.jpg" class="w-full aspect-video object-cover rounded-t-12">
                    <div class="p-3 text-[10px] font-bold truncate uppercase">${v.title}</div>
                </div>`;
            });
        });
    }

    function triggerAd(vid, title) {
        if(settings.adStatus === 'off') { playVideo(vid, title); return; }
        
        const modal = document.getElementById('ad-modal');
        document.getElementById('ad-frame').src = settings.adLink || MY_AD_LINK;
        modal.style.display = 'flex';
        
        let timeLeft = settings.skipTimer || 10;
        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('ad-timer').innerText = `WAIT: ${timeLeft}s`;
            if(timeLeft <= 0) {
                clearInterval(timer);
                const btn = document.getElementById('skip-ad');
                btn.disabled = false;
                btn.innerText = "SKIP & WATCH";
                btn.className = "bg-blue-600 text-white px-8 py-2 rounded-lg font-bold text-xs";
                btn.onclick = () => {
                    modal.style.display = 'none';
                    playVideo(vid, title);
                };
            }
        }, 1000);
    }

    function playVideo(id, title) {
        document.getElementById('player-box').classList.remove('hidden');
        // ইউটিউব ভিডিও যাতে সরাসরি ইউটিউব অ্যাপে না যায় তার জন্য প্রক্সি রিলে
        document.getElementById('main-video').src = `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&showinfo=0&autoplay=1`;
        document.getElementById('playing-title').innerText = title;
        window.scrollTo({top: 0, behavior: 'smooth'});
        
        // ডাউনলোড বাটন কন্ট্রোল
        const dl = document.getElementById('dl-btn');
        dl.onclick = () => window.open(`https://www.youtubepp.com/watch?v=${id}`, '_blank');
        if(settings.dlStatus === 'off') dl.classList.add('hidden'); else dl.classList.remove('hidden');
    }
</script>
</body>
</html>
