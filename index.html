<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        #gate-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .video-container { width: 100%; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 15px; background: #000; }
        .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="gate-overlay">
    <div class="w-[90%] max-w-md bg-[#0f172a] rounded-[30px] border-2 border-blue-500 overflow-hidden shadow-2xl">
        <div id="ad-slot" class="h-64 bg-black flex items-center justify-center text-xs text-gray-500">AD LOADING...</div>
        <div class="p-4 flex justify-between items-center bg-[#1e293b]">
            <span id="timer-text" class="text-xs font-bold text-blue-400">WAIT: 10s</span>
            <button id="skip-now" disabled class="bg-gray-700 px-6 py-2 rounded-xl text-[10px] font-black opacity-50 uppercase">Skip Ad</button>
        </div>
    </div>
</div>

<nav class="p-5 border-b border-white/5 flex justify-between items-center sticky top-0 bg-[#020617]/90 backdrop-blur-md z-50">
    <h1 class="text-xl font-black text-blue-500 italic">SADDAM CINEMA PRO</h1>
    <div class="bg-blue-600/10 px-4 py-1 rounded-full border border-blue-500/20 text-[10px] font-bold text-blue-400">ONLINE: <span id="online-val">0</span></div>
</nav>

<main class="p-5 grid grid-cols-1 md:grid-cols-3 gap-6 pb-20" id="movie-list"></main>

<script>
    const firebaseConfig = { databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('settings').on('value', snap => {
        const d = snap.val();
        if(d && d.adStatus === 'on') {
            const gate = document.getElementById('gate-overlay');
            gate.style.display = 'flex';
            document.getElementById('ad-slot').innerHTML = d.ban1 || "";
            
            let s = d.timer || 10;
            const iv = setInterval(() => {
                s--; document.getElementById('timer-text').innerText = `WAIT: ${s}s`;
                if(s <= 0) {
                    clearInterval(iv);
                    const btn = document.getElementById('skip-now');
                    btn.disabled = false; btn.classList.replace('bg-gray-700', 'bg-blue-600'); btn.classList.remove('opacity-50');
                    btn.onclick = (e) => { e.stopPropagation(); gate.style.display = 'none'; };
                }
            }, 1000);
        }
    });

    db.ref('movies').on('value', snap => {
        const list = document.getElementById('movie-list'); list.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            list.innerHTML += `
            <div class="bg-slate-900/50 p-4 rounded-[25px] border border-white/5">
                <div class="video-container mb-4">
                    <video controls poster="${m.thumb}" preload="none">
                        <source src="${m.download}" type="video/mp4">
                    </video>
                </div>
                <h3 class="text-sm font-bold truncate mb-3">${m.name}</h3>
                <button onclick="handleDL('${m.download}')" class="w-full bg-blue-600 py-3 rounded-xl text-[10px] font-black uppercase">Direct Download</button>
            </div>`;
        });
    });

    function handleDL(url) {
        const a = document.createElement('a'); a.href = url; a.download = ""; a.target = "_blank"; a.click();
    }

    const stRef = db.ref('status/users').push(true); stRef.onDisconnect().remove();
    db.ref('status/users').on('value', s => { document.getElementById('online-val').innerText = s.numChildren(); });
</script>
</body>
</html>
