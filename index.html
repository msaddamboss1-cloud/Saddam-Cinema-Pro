<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam cinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020617; color: white; margin: 0; overflow-x: hidden; font-family: sans-serif; }
        #heavy-ad-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(30px); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .income-strip { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; border-top: 2px solid #3b82f6; z-index: 999; display: flex; justify-content: center; align-items: center; }
        .movie-card { background: #0f172a; border-radius: 25px; border: 1px solid #1e293b; transition: 0.3s; }
        .movie-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
        .search-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #1e293b; border-radius: 20px; }
    </style>
</head>
<body>

    <div id="heavy-ad-overlay">
        <div class="w-[90%] max-w-md bg-[#0f172a] rounded-[40px] border-2 border-blue-500 overflow-hidden shadow-2xl">
            <div id="main-ad-slot" class="min-h-[300px] bg-black flex items-center justify-center text-[10px] text-gray-600 italic">ADVERTISEMENT LOADED...</div>
            <div class="p-6 flex justify-between items-center bg-[#1e293b]">
                <span id="gate-timer" class="text-sm font-bold text-blue-400 font-mono">WAIT: 10s</span>
                <button id="gate-skip" disabled class="bg-gray-800 px-8 py-3 rounded-2xl text-xs font-black opacity-50">SKIP AD</button>
            </div>
        </div>
    </div>

    <nav class="p-5 border-b border-white/5 flex justify-between items-center sticky top-0 bg-[#020617]/90 backdrop-blur-xl z-50">
        <h1 id="s-name" class="text-2xl font-black italic text-blue-500 uppercase tracking-tighter">SADDAM CINEMA PRO</h1>
        <div class="bg-blue-500/10 px-4 py-1 rounded-full border border-blue-500/30 text-[10px] font-bold text-blue-400">LIVE: <span id="u-count">0</span></div>
    </nav>

    <main class="p-5 max-w-6xl mx-auto pb-32">
        <div class="mb-8 relative">
            <input type="text" id="searchInput" placeholder="মুভির নাম লিখে সার্চ করুন..." class="search-box w-full p-5 pl-14 outline-none text-sm focus:border-blue-500 transition">
            <svg class="w-6 h-6 absolute left-5 top-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5"></div>
    </main>

    <div class="income-strip" id="always-on-ad"></div>

<script>
    firebase.initializeApp({ databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" });
    const db = firebase.database();

    const uRef = db.ref('status/users').push(true); uRef.onDisconnect().remove();
    db.ref('status/users').on('value', s => { document.getElementById('u-count').innerText = s.numChildren(); });

    db.ref('settings').on('value', snap => {
        const d = snap.val(); if(!d) return;
        document.getElementById('s-name').innerText = d.siteName || "SADDAM CINEMA PRO";
        
        // ২৪ ঘণ্টা ইনকাম অ্যাড লোড
        if(d.ban2) {
            const strip = document.getElementById('always-on-ad');
            strip.innerHTML = d.ban2;
            executeScripts(strip);
        }
        
        // মেইন অ্যাড গেট
        if(d.adStatus === 'on') {
            const overlay = document.getElementById('heavy-ad-overlay');
            overlay.style.display = 'flex';
            const slot = document.getElementById('main-ad-slot');
            slot.innerHTML = d.ban1;
            executeScripts(slot);

            let timeLeft = d.timer || 10;
            const t = setInterval(() => {
                timeLeft--;
                document.getElementById('gate-timer').innerText = `WAIT: ${timeLeft}s`;
                if(timeLeft <= 0) {
                    clearInterval(t);
                    const btn = document.getElementById('gate-skip');
                    btn.disabled = false; btn.classList.replace('bg-gray-800', 'bg-blue-600'); btn.classList.remove('opacity-50');
                    btn.onclick = () => overlay.style.display = 'none';
                }
            }, 1000);
        }
    });

    // স্ক্রিপ্ট চালানোর জন্য স্পেশাল ফাংশন
    function executeScripts(elem) {
        const scripts = elem.getElementsByTagName("script");
        for (let i = 0; i < scripts.length; i++) {
            const s = document.createElement("script");
            if (scripts[i].src) s.src = scripts[i].src;
            else s.textContent = scripts[i].textContent;
            document.body.appendChild(s);
        }
    }

    let allMovies = [];
    db.ref('movies').on('value', snap => {
        allMovies = [];
        snap.forEach(c => { allMovies.push(c.val()); });
        renderMovies(allMovies);
    });

    function renderMovies(movies) {
        const grid = document.getElementById('movie-grid'); grid.innerHTML = "";
        movies.forEach(m => {
            grid.innerHTML += `
            <div class="movie-card overflow-hidden shadow-2xl">
                <img src="${m.thumb}" class="w-full aspect-[3/4] object-cover">
                <div class="p-4">
                    <p class="text-[10px] font-bold truncate mb-3 uppercase tracking-tighter">${m.name}</p>
                    <button onclick="window.location.href='${m.download}'" class="w-full bg-blue-600 py-2 rounded-xl text-[9px] font-black shadow-lg shadow-blue-600/20 active:scale-95 transition">DOWNLOAD</button>
                </div>
            </div>`;
        });
    }

    document.getElementById('searchInput').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allMovies.filter(m => m.name.toLowerCase().includes(term));
        renderMovies(filtered);
    };
</script>
</body>
</html>
