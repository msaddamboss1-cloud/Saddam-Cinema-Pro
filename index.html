<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020617; color: white; }
        #gate-ad { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div id="gate-ad">
    <div class="w-[90%] max-w-sm bg-[#0f172a] rounded-[30px] border border-blue-500 overflow-hidden shadow-2xl">
        <div id="ad-content" class="h-64 flex items-center justify-center text-gray-500 italic text-[10px]">PREMIUM AD LOADING...</div>
        <div class="p-5 flex justify-between items-center bg-[#1e293b]">
            <span id="timer-txt" class="text-xs font-black text-blue-400">Wait: 10s</span>
            <button id="skip-btn" disabled class="bg-gray-700 px-6 py-2 rounded-xl text-[10px] font-black opacity-50 uppercase">Skip</button>
        </div>
    </div>
</div>
<nav class="p-6 sticky top-0 bg-[#020617]/90 backdrop-blur-md z-50 border-b border-white/5">
    <h1 class="text-xl font-black italic text-blue-500 mb-4">SADDAM CINEMA PRO</h1>
    <input type="text" id="srch" onkeyup="srchMov()" placeholder="Search movies or categories..." class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500">
</nav>
<div id="m-grid" class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6"></div>
<script>
    firebase.initializeApp({ databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    db.ref('settings').on('value', s => {
        const d = s.val(); if(d.gateStatus === 'on'){
            document.getElementById('gate-ad').style.display='flex';
            document.getElementById('ad-content').innerHTML = `<script src="${d.adUrl}"><\/script>`;
            let t = 10; const iv = setInterval(()=>{ t--; document.getElementById('timer-txt').innerText=`Wait: ${t}s`;
            if(t<=0){ clearInterval(iv); const b=document.getElementById('skip-btn'); b.disabled=false; b.classList.replace('bg-gray-700','bg-blue-600'); b.classList.remove('opacity-50'); b.onclick=()=>document.getElementById('gate-ad').style.display='none'; }
            },1000);
        }
    });
    db.ref('movies').on('value', s => {
        const g = document.getElementById('m-grid'); g.innerHTML="";
        s.forEach(c => { const m=c.val(); g.innerHTML += `<div class="m-card bg-slate-900/50 p-4 rounded-[30px] border border-white/5" data-n="${m.name.toLowerCase()}">
            <video controls poster="${m.thumb}" class="w-full aspect-video rounded-xl mb-4"><source src="${m.s1}"></video>
            <p class="text-[11px] font-bold uppercase mb-4 opacity-70">${m.name}</p>
            <div class="grid grid-cols-2 gap-2"><button onclick="window.open('${m.s1}')" class="bg-blue-600 py-3 rounded-xl text-[9px] font-black uppercase">Server 1</button>
            <button onclick="window.open('${m.s2||m.s1}')" class="bg-slate-800 py-3 rounded-xl text-[9px] font-black uppercase">Server 2</button></div></div>`;
        });
    });
    function srchMov(){ const q=document.getElementById('srch').value.toLowerCase(); document.querySelectorAll('.m-card').forEach(c=>c.style.display=c.getAttribute('data-n').includes(q)?'block':'none'); }
</script>
</body>
</html>
