           <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020617; color: white; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #gate-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(25px); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .income-strip { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 2px solid #3b82f6; z-index: 999; display: flex; justify-content: center; align-items: center; }
        .movie-card { background: #0f172a; border-radius: 20px; border: 1px solid #1e293b; overflow: hidden; transition: 0.3s hover; }
    </style>
</head>
<body>

    <div id="gate-overlay">
        <div class="w-[90%] max-w-md bg-[#0f172a] rounded-[35px] border-2 border-blue-500 overflow-hidden shadow-2xl">
            <div id="ad-slot-1" class="min-h-[320px] bg-black flex items-center justify-center text-[10px] text-gray-500 italic uppercase">Fetching Ads...</div>
            <div class="p-5 flex justify-between items-center bg-[#1e293b]">
                <span id="timer-text" class="text-sm font-black text-blue-400 font-mono">WAIT: 10s</span>
                <button id="skip-now" disabled class="bg-gray-800 px-8 py-3 rounded-2xl text-[10px] font-black opacity-50">SKIP AD</button>
            </div>
        </div>
    </div>

    <nav class="p-5 border-b border-white/5 flex justify-between items-center sticky top-0 bg-[#020617]/90 backdrop-blur-md z-50">
        <h1 id="brand-name" class="text-xl font-black italic text-blue-500 uppercase">SADDAM CINEMA</h1>
        <div class="bg-blue-600/10 px-4 py-1 rounded-full border border-blue-500/20 text-[10px] font-bold text-blue-400">ONLINE: <span id="online-val">0</span></div>
    </nav>

    <main class="p-5 max-w-6xl mx-auto pb-32">
        <div id="movie-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </main>

    <div class="income-strip" id="footer-ad"></div>

<script>
    firebase.initializeApp({ databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" });
    const db = firebase.database();

    // অ্যাড স্ক্রিপ্ট রান করার অটোমেটিক ইঞ্জিন
    function runScripts(box) {
        const codes = box.getElementsByTagName("script");
        for (let i = 0; i < codes.length; i++) {
            const s = document.createElement("script");
            if (codes[i].src) s.src = codes[i].src;
            else s.textContent = codes[i].textContent;
            document.head.appendChild(s);
        }
    }

    // সেটিংস ও অ্যাড লোডিং
    db.ref('settings').on('value', snap => {
        const d = snap.val(); if(!d) return;
        document.getElementById('brand-name').innerText = d.siteName || "SADDAM CINEMA";
        
        // নিচের স্টিকি অ্যাড
        if(d.ban2) {
            const fAd = document.getElementById('footer-ad');
            fAd.innerHTML = d.ban2; runScripts(fAd);
        }

        // এন্ট্রি অ্যাড গেট
        if(d.adStatus === 'on') {
            const gate = document.getElementById('gate-overlay');
            gate.style.display = 'flex';
            const slot = document.getElementById('ad-slot-1');
            slot.innerHTML = d.ban1; runScripts(slot);

            let s = d.timer || 10;
            const iv = setInterval(() => {
                s--; document.getElementById('timer-text').innerText = `WAIT: ${s}s`;
                if(s <= 0) {
                    clearInterval(iv);
                    const btn = document.getElementById('skip-now');
                    btn.disabled = false; btn.classList.replace('bg-gray-800', 'bg-blue-600');
                    btn.classList.remove('opacity-50');
                    btn.onclick = () => gate.style.display = 'none';
                }
            }, 1000);
        }
    });

    // মুভি ডিসপ্লে
    db.ref('movies').on('value', snap => {
        const list = document.getElementById('movie-list'); list.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            list.innerHTML += `
            <div class="movie-card group">
                <img src="${m.thumb}" class="w-full aspect-[3/4] object-cover group-hover:opacity-80 transition">
                <div class="p-3">
                    <p class="text-[10px] font-bold truncate mb-2 uppercase">${m.name}</p>
                    <button onclick="window.location.href='${m.download}'" class="w-full bg-blue-600 py-2 rounded-lg text-[9px] font-black tracking-tighter active:scale-90 transition">DIRECT DOWNLOAD</button>
                </div>
            </div>`;
        });
    });

    // অনলাইন কাউন্ট
    const stRef = db.ref('status/users').push(true); stRef.onDisconnect().remove();
    db.ref('status/users').on('value', s => { document.getElementById('online-val').innerText = s.numChildren(); });
</script>
</body>
</html>
