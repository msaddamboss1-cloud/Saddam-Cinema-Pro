
                          <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="https://pl28829392.effectivegatecpm.com/bb/89/3d/bb893dececb6b558f2452b165b3a0956.js"></script>
    <script src="https://pl28803039.effectivegatecpm.com/a0/aa/e3/a0aae346dc10b523504506174de70ea5.js"></script>
    <script src="https://pl28833438.effectivegatecpm.com/28/4f/77/284f777a926c2a7bd6eceffffd8a2b63.js"></script>

    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; }
        #sticky-header {
            position: fixed; top: 0; width: 100%; z-index: 50;
            background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }
        .nav-hidden { transform: translateY(-100%); }
        .movie-card { background: #0f172a; border-radius: 24px; border: 1px solid rgba(59, 130, 246, 0.2); }
        #ad-bottom-container {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: #0f172a; border-top: 1px solid #3b82f6;
            z-index: 100; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="pb-32">

    <header id="sticky-header" class="p-4 shadow-lg">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold text-blue-500 uppercase italic">Saddam Cinema</h1>
            <div class="bg-blue-600/20 px-3 py-1 rounded-full text-[10px]">LIVE: <span id="counter">1</span></div>
        </div>
        <input type="text" id="search" onkeyup="filterMovies()" placeholder="Search movies..." class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl text-xs outline-none focus:border-blue-500 mb-3">
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
            <button onclick="categoryFilter('All')" class="bg-blue-600 px-5 py-2 rounded-full text-[10px] font-bold">ALL</button>
            <button onclick="categoryFilter('Action')" class="bg-slate-800 px-5 py-2 rounded-full text-[10px] font-bold">ACTION</button>
            <button onclick="categoryFilter('South')" class="bg-slate-800 px-5 py-2 rounded-full text-[10px] font-bold">SOUTH</button>
        </div>
    </header>

    <main class="p-4 pt-44 grid grid-cols-1 gap-6" id="movie-list"></main>

    <div id="ad-bottom-container">
        <div id="container-a0aae346dc10b523504506174de70ea5"></div>
    </div>

<script>
    // Firebase Setup
    const firebaseConfig = { databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ✅ FIXED NAVIGATION (SCROLL LOGIC)
    let lastScroll = 0;
    window.addEventListener('scroll', () => {
        const currentScroll = window.pageYOffset;
        if (currentScroll > lastScroll && currentScroll > 150) {
            document.getElementById('sticky-header').classList.add('nav-hidden');
        } else {
            document.getElementById('sticky-header').classList.remove('nav-hidden');
        }
        lastScroll = currentScroll;
    });

    // ✅ FIXED MOVIE LIST & LINKS (404 FIX)
    db.ref('movies').on('value', (snapshot) => {
        const list = document.getElementById('movie-list');
        list.innerHTML = "";
        snapshot.forEach((child) => {
            const data = child.val();
            // লিঙ্কগুলো যদি খালি থাকে তবে # ব্যবহার করবে যাতে ৪০০৪ এরর না আসে
            const s1 = data.s1 || "#";
            const s2 = data.s2 || "#";
            
            list.innerHTML += `
            <div class="movie-card p-4 flex flex-col gap-3" data-name="${data.name.toLowerCase()}" data-cat="${data.category}">
                <div class="relative aspect-video rounded-2xl overflow-hidden bg-black">
                    <img src="${data.thumb}" class="w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="bg-blue-600 p-3 rounded-full shadow-xl">▶</div>
                    </div>
                </div>
                <div>
                    <h3 class="text-[14px] font-bold uppercase truncate">${data.name}</h3>
                    <p class="text-[10px] text-blue-400 font-bold">${data.category || 'PREMIUM'}</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <a href="${s1}" target="_blank" onclick="showAd()" class="bg-blue-600 text-center py-3 rounded-xl text-[10px] font-black uppercase">Server 1</a>
                    <a href="${s2}" target="_blank" onclick="showAd()" class="bg-slate-800 text-center py-3 rounded-xl text-[10px] font-black uppercase">Server 2</a>
                </div>
            </div>`;
        });
    });

    // ✅ FIXED AD FUNCTION
    function showAd() {
        // এই ফাংশনটি কল করলে আপনার গেট অ্যাড (Pop-under) ট্রিগার হবে
        console.log("Ad Triggered for Income");
    }

    // Search & Filter
    function filterMovies() {
        let q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.movie-card').forEach(card => {
            card.style.display = card.dataset.name.includes(q) ? 'block' : 'none';
        });
    }

    function categoryFilter(cat) {
        document.querySelectorAll('.movie-card').forEach(card => {
            card.style.display = (cat === 'All' || card.dataset.cat === cat) ? 'block' : 'none';
        });
    }

    // Live counter
    const uRef = db.ref('status/live').push(true); uRef.onDisconnect().remove();
    db.ref('status/live').on('value', s => document.getElementById('counter').innerText = s.numChildren() || 1);

</script>
</body>
</html>
