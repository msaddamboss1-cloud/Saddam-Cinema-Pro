                   <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamic-title">Saddam Supreme | Premium OTT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --main-color: #3b82f6; }
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .blur-bg { filter: blur(30px); pointer-events: none; transition: 0.8s; }
        .ad-modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; height: 75%; background: #0d1425; z-index: 10000;
            border-radius: 40px; border: 2px solid var(--main-color);
            display: none; flex-direction: column; overflow: hidden; box-shadow: 0 0 150px rgba(0,0,0,1);
        }
        .swiper { width: 100%; height: 400px; border-radius: 30px; margin-bottom: 30px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        .movie-card { position: relative; border-radius: 20px; overflow: hidden; cursor: pointer; transition: 0.4s; background: #0f172a; border: 1px solid rgba(255,255,255,0.05); }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--main-color); }
        .notice-bar { background: var(--main-color); color: white; padding: 10px; font-weight: bold; overflow: hidden; white-space: nowrap; }
        .notice-text { display: inline-block; animation: scroll 20s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .loader-skeleton { background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

<div id="app-wrap">
    <div id="notice-container" class="notice-bar hidden">
        <div class="notice-text" id="notice-val">নতুন মুভি আপলোড হয়েছে! এনজয় করুন।</div>
    </div>

    <nav class="p-6 bg-[#020617]/90 backdrop-blur-2xl sticky top-0 z-[100] border-b border-white/5 flex justify-between items-center">
        <h1 id="site-logo" class="text-3xl font-black italic uppercase tracking-tighter" style="color: var(--main-color);">SADDAM</h1>
        <div class="flex items-center space-x-4">
            <span id="live-status" class="text-[10px] font-bold uppercase px-3 py-1 bg-white/5 rounded-full border border-white/10 tracking-widest text-gray-400">Loading...</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 space-y-8">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="slider-wrap">
                </div>
        </div>

        <div id="player-zone" class="hidden space-y-6">
            <div class="aspect-video rounded-[40px] overflow-hidden border-4 border-white/5 shadow-2xl bg-black">
                <iframe id="main-frame" class="w-full h-full" src="" allow="autoplay"></iframe>
            </div>
            <div class="p-8 bg-[#0d1425] rounded-[35px] border border-white/5 flex flex-col md:flex-row justify-between items-center gap-6">
                <h2 id="video-title" class="text-xl font-bold uppercase">Movie Title</h2>
                <div class="flex gap-4">
                    <button onclick="dlProcess()" class="bg-green-600 px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-green-600/20">Download</button>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <h3 class="text-xs font-black uppercase tracking-[0.6em] text-gray-500 flex items-center">
                <span class="w-10 h-0.5 mr-3" style="background: var(--main-color);"></span> Trending Now
            </h3>
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                <div class="h-40 rounded-2xl loader-skeleton"></div>
                <div class="h-40 rounded-2xl loader-skeleton"></div>
                <div class="h-40 rounded-2xl loader-skeleton"></div>
            </div>
        </div>
    </main>
</div>

<div id="ad-box" class="ad-modal">
    <iframe id="ad-iframe" class="w-full h-full bg-black"></iframe>
    <div class="p-6 bg-[#0d1425] flex justify-between items-center">
        <span id="timer-txt" class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Wait: 10s</span>
        <button id="skip-btn" disabled class="px-12 py-4 bg-gray-800 text-gray-600 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all">Please Wait</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB7w62sre73EzNY7TsvHfg88sjVrzPTcSM", 
        databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com",
        projectId: "saddam-premium-hub" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const API_KEY = "AIzaSyB7w62sre73EzNY7TsvHfg88sjVrzPTcSM";
    let st = {};

    db.ref('settings').on('value', snap => {
        st = snap.val();
        applySettings();
        if(st.channelId) loadVideos(st.channelId);
        if(st.adStatus === 'on') setTimeout(() => showAdBox(), (st.entryDelay || 3) * 1000);
    });

    function applySettings() {
        document.documentElement.style.setProperty('--main-color', st.themeColor || '#3b82f6');
        document.getElementById('dynamic-title').innerText = st.siteName || 'Saddam Supreme';
        document.getElementById('site-logo').innerText = st.siteName || 'Saddam';
        document.getElementById('live-status').innerText = st.liveText || 'Live Server';
        
        if(st.notice) {
            document.getElementById('notice-container').classList.remove('hidden');
            document.getElementById('notice-val').innerText = st.notice;
        }

        const slider = document.getElementById('slider-wrap');
        slider.innerHTML = "";
        const banners = st.banners ? st.banners.split(',') : ['https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=2070&auto=format&fit=crop'];
        banners.forEach(b => {
            slider.innerHTML += `<div class="swiper-slide"><img src="${b.trim()}"></div>`;
        });
        new Swiper(".mySwiper", { autoplay: { delay: 3000 } });
    }

    async function loadVideos(cid) {
        let channelId = cid.includes('youtube.com') ? cid.split('/').pop().replace('@', '') : cid;
        const res = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${channelId}&part=snippet,id&order=date&maxResults=25&type=video`);
        const data = await res.json();
        const grid = document.getElementById('movie-grid');
        grid.innerHTML = "";
        data.items.forEach(v => {
            grid.innerHTML += `
                <div onclick="showAdBox('${v.id.videoId}', '${v.snippet.title.replace(/'/g, "")}')" class="movie-card">
                    <img src="${v.snippet.thumbnails.high.url}">
                    <div class="p-4 bg-gradient-to-t from-black to-transparent">
                        <h4 class="text-[10px] font-black uppercase truncate text-gray-300">${v.snippet.title}</h4>
                    </div>
                </div>`;
        });
    }

    function showAdBox(vidId, title) {
        if(st.adStatus === 'off' && vidId) { playVideo(vidId, title); return; }
        const modal = document.getElementById('ad-box');
        document.getElementById('ad-iframe').src = st.adLink;
        modal.style.display = 'flex';
        document.getElementById('app-wrap').classList.add('blur-bg');
        let t = st.skipTimer || 10;
        const cd = setInterval(() => {
            t--;
            document.getElementById('timer-txt').innerText = `Wait: ${t}s`;
            if(t <= 0) {
                clearInterval(cd);
                const btn = document.getElementById('skip-btn');
                btn.disabled = false; btn.innerText = "SKIP & CONTINUE";
                btn.classList.replace('bg-gray-800', 'bg-blue-600'); btn.classList.replace('text-gray-600', 'text-white');
                btn.onclick = () => {
                    modal.style.display = 'none';
                    document.getElementById('app-wrap').classList.remove('blur-bg');
                    if(vidId) playVideo(vidId, title);
                };
            }
        }, 1000);
    }

    function playVideo(id, title) {
        document.getElementById('player-zone').classList.remove('hidden');
        document.getElementById('main-frame').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        document.getElementById('video-title').innerText = title;
        window.scrollTo({top: 0, behavior: 'smooth'});
        window.currentId = id;
    }

    function dlProcess() {
        alert("ডাউনলোড লিঙ্ক জেনারেট হচ্ছে... ৫ সেকেন্ড অপেক্ষা করুন।");
        setTimeout(() => {
            window.open(`https://www.youtubepp.com/watch?v=${window.currentId}`, '_blank');
        }, 5000);
    }
</script>
</body>
</html>
