                    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema - Global Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="https://pl28803039.effectivegatecpm.com/a0/aa/e3/a0aae346dc10b523504506174de70ea5.js"></script>
    <script src="https://pl28833438.effectivegatecpm.com/28/4f/77/284f777a926c2a7bd6eceffffd8a2b63.js"></script>
    <script src="https://pl28829392.effectivegatecpm.com/bb/89/3d/bb893dececb6b558f2452b165b3a0956.js"></script>

    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        
        /* 90% Premium Ad Gate */
        #ad-gate { 
            position: fixed; top: 5%; left: 5%; width: 90%; height: 85%; 
            background: #0f172a; z-index: 10000; border-radius: 40px; 
            border: 1px solid rgba(59, 130, 246, 0.5); overflow: hidden; 
            box-shadow: 0 0 100px rgba(0,0,0,0.9); display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .content-blur { filter: blur(15px); pointer-events: none; transition: 0.5s; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-blur: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .movie-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .movie-card:hover { transform: scale(1.03); border-color: #3b82f6; }
    </style>
</head>
<body>

<div id="ad-gate">
    <div class="flex flex-col h-full">
        <div class="flex-grow bg-black relative flex items-center justify-center">
            <p class="text-[10px] text-blue-500/50 italic animate-pulse">Premium Content Loading Through Ad-Gate...</p>
            <iframe id="ad-frame" src="" class="absolute inset-0 w-full h-full border-none"></iframe>
        </div>
        <div class="p-6 glass border-t border-blue-500/20 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Saddam Cinema Ads</span>
                <span id="timer-txt" class="text-xs font-bold opacity-60">Unlock in 10s</span>
            </div>
            <button id="skip-btn" disabled class="bg-gray-800 px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest opacity-40 transition-all active:scale-95">Skip & Watch</button>
        </div>
    </div>
</div>

<div id="main-content">
    <nav class="p-6 sticky top-0 z-50 glass border-b border-white/5">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-black italic text-blue-500 tracking-tighter">SADDAM CINEMA</h1>
                    <p class="text-[9px] font-bold opacity-40 tracking-widest uppercase">Premium HUB</p>
                </div>
                <div class="flex items-center gap-2 bg-blue-600/10 px-4 py-2 rounded-full border border-blue-500/20">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span></span>
                    <span class="text-[10px] font-black text-blue-400">ONLINE: <span id="live-users">0</span></span>
                </div>
            </div>

            <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2" id="cat-nav">
                <button onclick="filterBy('All')" class="cat-btn bg-blue-600 px-6 py-2.5 rounded-full text-[10px] font-black uppercase">All</button>
                <button onclick="filterBy('Action')" class="cat-btn bg-white/5 px-6 py-2.5 rounded-full text-[10px] font-black uppercase border border-white/10">Action</button>
                <button onclick="filterBy('Horror')" class="cat-btn bg-white/5 px-6 py-2.5 rounded-full text-[10px] font-black uppercase border border-white/10">Horror</button>
                <button onclick="filterBy('South')" class="cat-btn bg-white/5 px-6 py-2.5 rounded-full text-[10px] font-black uppercase border border-white/10">South</button>
                <button onclick="filterBy('Web Series')" class="cat-btn bg-white/5 px-6 py-2.5 rounded-full text-[10px] font-black uppercase border border-white/10">Web Series</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="movie-grid">
        </main>
</div>

<script>
    // Firebase Initialized with your config
    const firebaseConfig = {
        databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Ad Gate Controller
    db.ref('settings').on('value', snap => {
        const set = snap.val() || {};
        if(set.gateStatus === 'on') {
            const gate = document.getElementById('ad-gate');
            const main = document.getElementById('main-content');
            gate.style.display = 'block';
            main.classList.add('content-blur');
            document.getElementById('ad-frame').src = set.adUrl || "about:blank";

            let count = 10;
            const timer = setInterval(() => {
                count--;
                document.getElementById('timer-txt').innerText = `Unlock in ${count}s`;
                if(count <= 0) {
                    clearInterval(timer);
                    const btn = document.getElementById('skip-btn');
                    btn.disabled = false;
                    btn.classList.replace('bg-gray-800', 'bg-blue-600');
                    btn.classList.remove('opacity-40');
                    btn.onclick = () => {
                        gate.style.display = 'none';
                        main.classList.remove('content-blur');
                    };
                }
            }, 1000);
        }
    });

    // 2. Movie Loader
    db.ref('movies').on('value', snap => {
        const grid = document.getElementById('movie-grid');
        grid.innerHTML = "";
        snap.forEach(child => {
            const m = child.val();
            grid.innerHTML += `
            <div class="movie-card glass p-4 rounded-[40px] flex flex-col gap-4 border border-white/5" data-cat="${m.category}">
                <div class="relative w-full aspect-video rounded-[30px] overflow-hidden bg-black shadow-2xl">
                    <video controls poster="${m.thumb}" class="w-full h-full object-cover"><source src="${m.s1}"></video>
                </div>
                <div class="px-2">
                    <h3 class="text-xs font-black uppercase tracking-tight truncate opacity-90">${m.name}</h3>
                    <p class="text-[8px] text-blue-500 font-bold mt-1 uppercase">${m.category || 'Movie'}</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="window.open('${m.s1}')" class="bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl text-[9px] font-black uppercase shadow-lg shadow-blue-600/20">Server 1</button>
                    <button onclick="window.open('${m.s2 || m.s1}')" class="bg-slate-800 py-4 rounded-2xl text-[9px] font-black uppercase">Server 2</button>
                </div>
            </div>`;
        });
    });

    // 3. Category Filter
    function filterBy(cat) {
        document.querySelectorAll('.movie-card').forEach(card => {
            card.style.display = (cat === 'All' || card.getAttribute('data-cat') === cat) ? 'block' : 'none';
        });
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.toggle('bg-blue-600', btn.innerText === cat);
            btn.classList.toggle('bg-white/5', btn.innerText !== cat);
        });
    }

    // 4. Live Counter
    const liveRef = db.ref('status/live').push(true);
    liveRef.onDisconnect().remove();
    db.ref('status/live').on('value', snap => {
        document.getElementById('live-users').innerText = snap.numChildren() || 0;
    });
</script>
</body>
                </html>
