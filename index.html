<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="https://pl28803039.effectivegatecpm.com/a0/aa/e3/a0aae346dc10b523504506174de70ea5.js" async></script>

    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; padding-bottom: 110px; }
        
        /* Magic Header Logic */
        #main-header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            background: rgba(2, 6, 23, 0.98);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .header-hidden { transform: translateY(-100%); }

        /* 90% Ad Gate */
        #ad-gate { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; 
            display: none; align-items: center; justify-content: center;
        }
        #ad-box {
            width: 92%; height: 85%; background: #0f172a; border-radius: 35px;
            border: 2px solid #3b82f6; overflow: hidden; position: relative;
        }

        /* Bottom Fixed Ad Area */
        #bottom-sticky {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 95px;
            background: #0f172a; border-top: 2px solid #3b82f6; z-index: 9000;
            display: flex; align-items: center; justify-content: center;
        }

        .movie-card { background: #0f172a; border-radius: 28px; border: 1px solid rgba(255,255,255,0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="ad-gate">
    <div id="ad-box" class="flex flex-col">
        <div class="flex-grow bg-black relative">
            <iframe id="gate-frame" src="" class="w-full h-full border-none"></iframe>
            <div id="ad-loading" class="absolute inset-0 flex items-center justify-center text-[10px] text-blue-500 italic uppercase">Loading Premium Ads...</div>
        </div>
        <div class="p-5 bg-slate-900 flex justify-between items-center border-t border-blue-500/20">
            <span id="gate-timer" class="text-xs font-black text-blue-400">WAIT: 10s</span>
            <button id="gate-skip" disabled class="bg-gray-800 px-10 py-3 rounded-2xl text-[10px] font-black uppercase opacity-40">Skip Ad</button>
        </div>
    </div>
</div>

<header id="main-header" class="p-4">
    <div class="flex justify-between items-center mb-4 px-2">
        <h1 class="text-xl font-black text-blue-500 italic">SADDAM CINEMA</h1>
        <div class="bg-blue-600/10 px-4 py-1.5 rounded-full border border-blue-500/20 text-[10px] font-bold text-blue-400">
            LIVE: <span id="online">1</span>
        </div>
    </div>

    <div class="relative mb-4">
        <input type="text" id="movie-search" onkeyup="searchMovie()" placeholder="Search movie or series..." class="w-full bg-slate-900 border border-white/5 p-3.5 pl-11 rounded-2xl text-[11px] outline-none focus:border-blue-600 transition-all shadow-inner">
        <span class="absolute left-4 top-3.5 opacity-30 text-sm">🔍</span>
    </div>

    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
        <button onclick="filterCat('All')" class="cat-btn bg-blue-600 px-6 py-2.5 rounded-full text-[10px] font-black uppercase shadow-lg">All</button>
        <button onclick="filterCat('Action')" class="cat-btn bg-white/5 px-6 py-2.5 rounded-full text-[10px] font-black border border-white/5 uppercase">Action</button>
        <button onclick="filterCat('Horror')" class="cat-btn bg-white/5 px-6 py-2.5 rounded-full text-[10px] font-black border border-white/5 uppercase">Horror</button>
        <button onclick="filterCat('South')" class="cat-btn bg-white/5 px-6 py-2.5 rounded-full text-[10px] font-black border border-white/5 uppercase">South</button>
    </div>
</header>

<main class="p-4 pt-44 grid grid-cols-1 gap-8" id="movie-list"></main>

<div id="bottom-sticky">
    <div id="container-a0aae346dc10b523504506174de70ea5"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- MAGIC HEADER LOGIC ---
    let lastScroll = 0;
    const header = document.getElementById('main-header');
    window.addEventListener('scroll', () => {
        const currentScroll = window.pageYOffset;
        if (currentScroll <= 0) {
            header.classList.remove('header-hidden');
            return;
        }
        if (currentScroll > lastScroll && !header.classList.contains('header-hidden')) {
            header.classList.add('header-hidden'); // নিচে গেলে হাইড
        } else if (currentScroll < lastScroll && header.classList.contains('header-hidden')) {
            header.classList.remove('header-hidden'); // উপরে টান দিলে শো
        }
        lastScroll = currentScroll;
    });

    // --- AD GATE LOGIC ---
    function triggerAd(link) {
        db.ref('settings').once('value', s => {
            const data = s.val() || {};
            if(data.gateStatus === 'on') {
                const gate = document.getElementById('ad-gate');
                gate.style.display = 'flex';
                document.getElementById('gate-frame').src = data.adUrl;

                let t = 10;
                const iv = setInterval(() => {
                    t--;
                    document.getElementById('gate-timer').innerText = `WAIT: ${t}s`;
                    if(t <= 0) {
                        clearInterval(iv);
                        const btn = document.getElementById('gate-skip');
                        btn.disabled = false; btn.classList.replace('bg-gray-800', 'bg-blue-600'); btn.classList.remove('opacity-40');
                        btn.onclick = () => {
                            gate.style.display = 'none';
                            if(link) window.open(link, '_blank');
                        };
                    }
                }, 1000);
            } else if(link) { window.open(link, '_blank'); }
        });
    }

    // --- MOVIE LOADING ---
    db.ref('movies').on('value', s => {
        const grid = document.getElementById('movie-list'); grid.innerHTML = "";
        s.forEach(child => {
            const m = child.val();
            grid.innerHTML += `
            <div class="movie-card p-4 flex flex-col gap-4 shadow-2xl" data-name="${m.name.toLowerCase()}" data-cat="${m.category}">
                <div class="relative aspect-video rounded-3xl overflow-hidden bg-black shadow-inner" onclick="triggerAd()">
                    <img src="${m.thumb}" class="w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="bg-blue-600 p-4 rounded-full shadow-2xl">▶</div>
                    </div>
                </div>
                <div class="px-2">
                    <h3 class="text-xs font-black uppercase truncate">${m.name}</h3>
                    <p class="text-[9px] text-blue-500 font-bold mt-1 opacity-70">${m.category}</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="triggerAd('${m.s1}')" class="bg-blue-600 py-3.5 rounded-2xl text-[9px] font-black uppercase tracking-widest shadow-lg shadow-blue-600/30">Server 1</button>
                    <button onclick="triggerAd('${m.s2 || m.s1}')" class="bg-slate-800 py-3.5 rounded-2xl text-[9px] font-black uppercase tracking-widest">Server 2</button>
                </div>
            </div>`;
        });
    });

    // --- SEARCH & FILTER ---
    function searchMovie() {
        let input = document.getElementById('movie-search').value.toLowerCase();
        document.querySelectorAll('.movie-card').forEach(card => {
            card.style.display = card.dataset.name.includes(input) ? 'block' : 'none';
        });
    }

    function filterCat(cat) {
        document.querySelectorAll('.movie-card').forEach(card => {
            card.style.display = (cat === 'All' || card.dataset.cat === cat) ? 'block' : 'none';
        });
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.toggle('bg-blue-600', btn.innerText === cat);
            btn.classList.toggle('bg-white/5', btn.innerText !== cat);
        });
    }

    // Live Counter
    const lRef = db.ref('status/live').push(true); lRef.onDisconnect().remove();
    db.ref('status/live').on('value', s => document.getElementById('online').innerText = s.numChildren() || 1);
    
    // Entry Ad
    window.onload = () => triggerAd();
</script>
</body>
</html>
