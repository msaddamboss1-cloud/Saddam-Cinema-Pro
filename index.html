               <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Supreme | Premium OTT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow-x: hidden; }
        .blur-active { filter: blur(30px); pointer-events: none; transition: 0.8s; }
        .ad-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 75%; background: #0d1425; z-index: 10000; border-radius: 40px; border: 1px solid rgba(59, 130, 246, 0.5); display: none; flex-direction: column; overflow: hidden; box-shadow: 0 0 150px rgba(0,0,0,1); }
        .movie-card { position: relative; border-radius: 20px; overflow: hidden; cursor: pointer; transition: 0.5s; background: #0f172a; border: 1px solid rgba(255,255,255,0.03); }
        .movie-card:hover { transform: scale(1.05); border-color: #3b82f6; }
    </style>
</head>
<body>

<div id="content-body">
    <nav class="p-6 bg-[#020617]/95 backdrop-blur-3xl sticky top-0 z-[100] border-b border-white/5 flex justify-between items-center">
        <h1 class="text-3xl font-black italic text-blue-500 uppercase tracking-tighter">SADDAM SUPREME</h1>
        <div class="flex items-center space-x-2"><span class="text-[10px] font-bold text-blue-500 animate-pulse">LIVE</span><div class="w-3 h-3 bg-blue-600 rounded-full"></div></div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-12">
        <div id="player-wrapper" class="hidden">
            <div class="rounded-[40px] overflow-hidden border-4 border-white/5 shadow-2xl aspect-video bg-black">
                <iframe id="video-frame" class="w-full h-full" src="" allow="autoplay"></iframe>
            </div>
            <div class="mt-6 flex flex-col md:flex-row justify-between items-center gap-6 bg-[#0d1425] p-8 rounded-[30px]">
                <h2 id="video-name" class="text-xl font-black uppercase text-white">Loading...</h2>
                <a id="download-url" target="_blank" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black text-xs uppercase">Download</a>
            </div>
        </div>

        <section class="space-y-8">
            <h3 class="text-xs font-black uppercase tracking-[0.5em] text-blue-500">New Releases 2026</h3>
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 text-center text-gray-500">মুভি লোড হচ্ছে...</div>
        </section>
    </main>
</div>

<div id="ad-box" class="ad-container">
    <div class="flex flex-col h-full relative">
        <iframe id="ad-frame" class="flex-grow bg-black"></iframe>
        <div class="p-6 bg-[#0d1425] flex justify-between items-center">
            <span id="timer-txt" class="text-[10px] font-black text-gray-500 uppercase">Wait: 10s</span>
            <button id="skip-btn" disabled class="px-10 py-3 bg-gray-800 text-gray-600 rounded-xl font-black uppercase text-[10px]">Skip Ad</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyB7w62sre73EzNY7TsvHfg88sjVrzPTcSM", databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com", projectId: "saddam-premium-hub" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const API_KEY = "AIzaSyB7w62sre73EzNY7TsvHfg88sjVrzPTcSM";
    const AD_LINK = "https://www.profitablecpmrate.com/un4f76p6p?key=f0b83b8b6f79986b5952e46049a463a6";

    db.ref('settings').on('value', snap => {
        const settings = snap.val();
        if(settings && settings.channelId) loadMovies(settings.channelId);
        if(settings && settings.status === 'on') showAd();
    });

    async function loadMovies(input) {
        let cid = input.split('/').pop().replace('@', '');
        const url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${cid}&part=snippet,id&order=date&maxResults=25&type=video`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = "";
            data.items.forEach(v => {
                grid.innerHTML += `<div onclick="showAd('${v.id.videoId}', '${v.snippet.title.replace(/'/g, "")}')" class="movie-card"><img src="${v.snippet.thumbnails.high.url}"><h4 class="p-3 text-[10px] font-black truncate">${v.snippet.title}</h4></div>`;
            });
        } catch(e) { document.getElementById('movie-grid').innerText = "চ্যানেল আইডি ভুল বা এপিআই লিমিট শেষ!"; }
    }

    function showAd(vidId, title) {
        const modal = document.getElementById('ad-box');
        document.getElementById('ad-frame').src = AD_LINK;
        modal.style.display = 'flex';
        document.getElementById('content-body').classList.add('blur-active');
        let left = 10;
        const clock = setInterval(() => {
            left--;
            document.getElementById('timer-txt').innerText = `Wait: ${left}s`;
            if(left <= 0) {
                clearInterval(clock);
                const skip = document.getElementById('skip-btn');
                skip.disabled = false; skip.innerText = "Close & Play"; skip.classList.replace('bg-gray-800', 'bg-blue-600'); skip.classList.replace('text-gray-600', 'text-white');
                skip.onclick = () => { modal.style.display = 'none'; document.getElementById('content-body').classList.remove('blur-active'); if(vidId) play(vidId, title); };
            }
        }, 1000);
    }

    function play(id, title) {
        document.getElementById('player-wrapper').classList.remove('hidden');
        document.getElementById('video-frame').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        document.getElementById('video-name').innerText = title;
        document.getElementById('download-url').href = `https://www.youtubepp.com/watch?v=${id}`;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
</script>
</body>
</html>
