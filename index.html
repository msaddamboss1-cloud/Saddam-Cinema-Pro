<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020617; color: white; }
        #gate-ad { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div id="gate-ad">
    <div class="w-[90%] max-w-sm bg-[#0f172a] rounded-[30px] border border-blue-500 overflow-hidden">
        <div id="ad-content" class="h-64 flex items-center justify-center text-gray-600 italic text-[10px]">LOADING AD...</div>
        <div class="p-4 flex justify-between items-center bg-[#1e293b]">
            <span id="ad-timer" class="text-xs font-bold text-blue-400">Wait: 10s</span>
            <button id="ad-skip" disabled class="bg-gray-700 px-6 py-2 rounded-xl text-[10px] font-black opacity-50 uppercase">Skip</button>
        </div>
    </div>
</div>
<nav class="p-5 sticky top-0 bg-[#020617]/90 backdrop-blur-md z-50 border-b border-white/5">
    <div class="flex justify-between items-center mb-4 text-blue-500 font-black italic text-xl">SADDAM CINEMA</div>
    <input type="text" id="search-bar" onkeyup="searchMovie()" placeholder="Search movies..." class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 outline-none focus:border-blue-500 text-sm">
</nav>
<main class="p-5 grid grid-cols-1 md:grid-cols-3 gap-6" id="movie-grid"></main>
<script>
    const firebaseConfig = { databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    db.ref('settings').on('value', snap => {
        const d = snap.val() || {};
        if(d.gateStatus === 'on') {
            const gate = document.getElementById('gate-ad'); gate.style.display = 'flex';
            document.getElementById('ad-content').innerHTML = `<script src="${d.adUrl}"><\/script>`;
            let s = d.timer || 10;
            const iv = setInterval(() => {
                s--; document.getElementById('ad-timer').innerText = `Wait: ${s}s`;
                if(s <= 0) { clearInterval(iv); const btn = document.getElementById('ad-skip'); btn.disabled = false; btn.classList.replace('bg-gray-700', 'bg-blue-600'); btn.classList.remove('opacity-50'); btn.onclick = () => gate.style.display = 'none'; }
            }, 1000);
        }
    });
    db.ref('movies').on('value', snap => {
        const grid = document.getElementById('movie-grid'); grid.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            grid.innerHTML += `<div class="movie-card bg-slate-900/50 p-4 rounded-[30px] border border-white/5" data-name="${m.name.toLowerCase()}">
                <video controls poster="${m.thumb}" class="mb-4 rounded-xl w-full aspect-video"><source src="${m.s1}" type="video/mp4"></video>
                <h3 class="text-xs font-bold truncate mb-4 opacity-80 uppercase">${m.name}</h3>
                <div class="grid grid-cols-2 gap-2"><button onclick="window.open('${m.s1}')" class="bg-blue-600 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest">Download</button></div>
            </div>`;
        });
    });
    function searchMovie() {
        const q = document.getElementById('search-bar').value.toLowerCase();
        document.querySelectorAll('.movie-card').forEach(c => { c.style.display = c.getAttribute('data-name').includes(q) ? 'block' : 'none'; });
    }
</script>
</body>
</html>
