
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        #gate-ad { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .v-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="gate-ad">
    <div class="w-[90%] max-w-sm bg-[#0f172a] rounded-[30px] border border-blue-500 overflow-hidden shadow-2xl">
        <div id="ad-content" class="h-64 flex items-center justify-center text-[10px] text-gray-500 italic">LOADING AD...</div>
        <div class="p-4 flex justify-between items-center bg-[#1e293b]">
            <span id="ad-timer" class="text-xs font-bold text-blue-400 uppercase">Wait: 10s</span>
            <button id="ad-skip" disabled class="bg-gray-700 px-6 py-2 rounded-xl text-[10px] font-black opacity-50 uppercase">Skip Ad</button>
        </div>
    </div>
</div>

<nav class="p-5 sticky top-0 bg-[#020617]/90 backdrop-blur-md z-50 border-b border-white/5">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-black italic text-blue-500">SADDAM CINEMA</h1>
        <div class="text-[10px] font-bold text-blue-400 bg-blue-500/10 px-3 py-1 rounded-full border border-blue-500/20">LIVE: <span id="online-count">0</span></div>
    </div>
    <input type="text" id="search-bar" onkeyup="searchMovie()" placeholder="Search your movie..." class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 outline-none focus:border-blue-500 text-sm">
</nav>

<main class="p-5 grid grid-cols-1 md:grid-cols-3 gap-6" id="movie-grid"></main>

<script>
    const firebaseConfig = { databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Ad Logic
    db.ref('settings').on('value', snap => {
        const d = snap.val() || {};
        if(d.adStatus === 'on') {
            const gate = document.getElementById('gate-ad');
            gate.style.display = 'flex';
            document.getElementById('ad-content').innerHTML = `<script src="${d.gateAd}"><\/script>`;
            
            let s = d.timer || 10;
            const timer = setInterval(() => {
                s--; document.getElementById('ad-timer').innerText = `Wait: ${s}s`;
                if(s <= 0) {
                    clearInterval(timer);
                    const btn = document.getElementById('ad-skip');
                    btn.disabled = false; btn.classList.replace('bg-gray-700', 'bg-blue-600'); btn.classList.remove('opacity-50');
                    btn.onclick = () => gate.style.display = 'none';
                }
            }, 1000);
        }
    });

    // Load Movies
    db.ref('movies').on('value', snap => {
        const grid = document.getElementById('movie-grid'); grid.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            grid.innerHTML += `
            <div class="movie-card bg-slate-900/50 p-4 rounded-[25px] border border-white/5" data-name="${m.name.toLowerCase()}">
                <div class="v-container mb-4">
                    <video controls poster="${m.thumb}" preload="none"><source src="${m.s1}" type="video/mp4"></video>
                </div>
                <h3 class="text-xs font-bold truncate mb-4 opacity-80">${m.name}</h3>
                <div class="grid grid-cols-2 gap-2">
                    <a href="${m.s1}" download class="bg-blue-600 py-3 rounded-xl text-[9px] font-black text-center">SERVER 1</a>
                    ${m.s2 ? `<a href="${m.s2}" download class="bg-indigo-600 py-3 rounded-xl text-[9px] font-black text-center">SERVER 2</a>` : ''}
                </div>
            </div>`;
        });
    });

    function searchMovie() {
        const query = document.getElementById('search-bar').value.toLowerCase();
        document.querySelectorAll('.movie-card').forEach(card => {
            card.style.display = card.getAttribute('data-name').includes(query) ? 'block' : 'none';
        });
    }

    const onlineRef = db.ref('status/users').push(true); onlineRef.onDisconnect().remove();
    db.ref('status/users').on('value', s => document.getElementById('online-count').innerText = s.numChildren());
</script>
</body>
</html>
