      <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam Cinema - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="https://pl28803039.effectivegatecpm.com/a0/aa/e3/a0aae346dc10b523504506174de70ea5.js" async></script>

    <style>
        body { background: #020617; color: white; padding-bottom: 120px; font-family: system-ui; }
        #ad-gate { position: fixed; top: 5%; left: 5%; width: 90%; height: 85%; background: #0f172a; z-index: 10000; border-radius: 30px; border: 2px solid #3b82f6; display: none; overflow: hidden; }
        #bottom-ad-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 90px; background: #0f172a; border-top: 1px solid #3b82f6; z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .blur-body { filter: blur(10px); pointer-events: none; }
        .movie-card { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 30px; transition: 0.3s; }
        .movie-card:hover { border-color: #3b82f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="ad-gate">
    <div class="flex flex-col h-full">
        <div class="flex-grow bg-black">
            <iframe id="gate-iframe" src="" class="w-full h-full border-none pointer-events-auto"></iframe>
        </div>
        <div class="p-4 bg-slate-900 flex justify-between items-center border-t border-blue-500/20">
            <span id="gate-timer" class="text-xs font-bold text-blue-400">WAIT: 10s</span>
            <button id="gate-skip" disabled class="bg-gray-800 px-8 py-3 rounded-xl text-[10px] font-black uppercase opacity-40">Skip Ad</button>
        </div>
    </div>
</div>

<div id="content-wrap">
    <nav class="p-6 sticky top-0 z-50 bg-[#020617]/95 backdrop-blur-md border-b border-white/5">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black italic text-blue-500">SADDAM CINEMA</h1>
            <div class="bg-blue-600/10 px-4 py-2 rounded-full border border-blue-500/20 text-[10px] font-bold text-blue-400">LIVE: <span id="live">0</span></div>
        </div>
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2" id="cat-list">
            <button onclick="filterCat('All')" class="cat-btn bg-blue-600 px-6 py-2 rounded-full text-[10px] font-bold uppercase whitespace-nowrap">All</button>
            <button onclick="filterCat('Action')" class="cat-btn bg-white/5 px-6 py-2 rounded-full text-[10px] font-bold border border-white/10 uppercase whitespace-nowrap">Action</button>
            <button onclick="filterCat('Horror')" class="cat-btn bg-white/5 px-6 py-2 rounded-full text-[10px] font-bold border border-white/10 uppercase whitespace-nowrap">Horror</button>
            <button onclick="filterCat('South')" class="cat-btn bg-white/5 px-6 py-2 rounded-full text-[10px] font-bold border border-white/10 uppercase whitespace-nowrap">South</button>
        </div>
    </nav>

    <main class="p-6 grid grid-cols-1 md:grid-cols-3 gap-8" id="movie-grid"></main>
</div>

<div id="bottom-ad-bar">
    <div id="container-a0aae346dc10b523504506174de70ea5"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://saddam-premium-hub-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Ad Gate Controller (Only triggers on specific actions)
    function openAdGate(callback) {
        db.ref('settings').once('value', s => {
            const d = s.val() || {};
            if(d.gateStatus === 'on') {
                const gate = document.getElementById('ad-gate');
                const wrap = document.getElementById('content-wrap');
                gate.style.display = 'block';
                wrap.classList.add('blur-body');
                document.getElementById('gate-iframe').src = d.adUrl;

                let t = 10;
                const iv = setInterval(() => {
                    t--; document.getElementById('gate-timer').innerText = `WAIT: ${t}s`;
                    if(t <= 0) {
                        clearInterval(iv);
                        const btn = document.getElementById('gate-skip');
                        btn.disabled = false; btn.classList.replace('bg-gray-800', 'bg-blue-600'); btn.classList.remove('opacity-40');
                        btn.onclick = () => {
                            gate.style.display = 'none';
                            wrap.classList.remove('blur-body');
                            if(callback) callback();
                        };
                    }
                }, 1000);
            } else { if(callback) callback(); }
        });
    }

    // Auto-gate when site loads
    window.onload = () => { openAdGate(); };

    // 2. Load Movies with Category Support
    db.ref('movies').on('value', s => {
        const grid = document.getElementById('movie-grid'); grid.innerHTML = "";
        s.forEach(c => {
            const m = c.val();
            grid.innerHTML += `
            <div class="movie-card p-5 flex flex-col gap-4" data-cat="${m.category}">
                <div class="relative aspect-video rounded-2xl overflow-hidden bg-black group" onclick="openAdGate()">
                    <img src="${m.thumb}" class="w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="bg-blue-600 p-3 rounded-full">▶</div>
                    </div>
                </div>
                <h3 class="text-xs font-bold uppercase truncate px-1">${m.name}</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="openAdGate(()=>window.open('${m.s1}'))" class="bg-blue-600 py-3 rounded-xl text-[9px] font-black uppercase">Server 1</button>
                    <button onclick="openAdGate(()=>window.open('${m.s2 || m.s1}'))" class="bg-slate-800 py-3 rounded-xl text-[9px] font-black uppercase">Server 2</button>
                </div>
            </div>`;
        });
    });

    // 3. Category Filter Logic
    function filterCat(cat) {
        document.querySelectorAll('.movie-card').forEach(card => {
            const mCat = card.getAttribute('data-cat');
            card.style.display = (cat === 'All' || mCat === cat) ? 'block' : 'none';
        });
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.toggle('bg-blue-600', btn.innerText === cat);
            btn.classList.toggle('bg-white/5', btn.innerText !== cat);
        });
    }

    // 4. Live Counter
    const lRef = db.ref('status/live').push(true); lRef.onDisconnect().remove();
    db.ref('status/live').on('value', s => document.getElementById('live').innerText = s.numChildren() || 0);
</script>
</body>
</html>
